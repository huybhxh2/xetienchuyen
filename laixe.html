<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App tài xế - Nhận chuyến</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#f3f4f6;padding:15px}
.container{max-width:800px;margin:auto}

.card{background:#fff;padding:15px;margin-top:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1);transition:0.2s}
.card:hover{box-shadow:0 4px 15px rgba(0,0,0,.15)}

button{padding:10px;border:none;border-radius:8px;cursor:pointer;margin-top:5px;font-weight:bold;transition:0.2s}
button:hover{opacity:0.9;transform:translateY(-1px)}

.btn{width:100%;background:#0d6efd;color:#fff}
.btn-warning{background:#ffc107;color:#000}
.btn-success{background:#198754;color:#fff}
.btn-danger{background:#dc3545;color:#fff}
.call{background:#198754;color:#fff;width:48%}
.map{background:#0dcaf0;color:#000;width:48%}

.row{display:flex;justify-content:space-between;margin-top:10px;gap:10px}
.row button{flex:1}

.status{padding:5px 12px;background:#e9ecef;border-radius:20px;display:inline-block;margin-top:8px;font-size:14px;font-weight:bold}
.status-choxacnhan{background:#ffc107;color:#856404}
.status-danhan{background:#17a2b8;color:#fff}
.status-dangcho{background:#007bff;color:#fff}
.status-hoanthanh{background:#28a745;color:#fff}

h2{text-align:center;color:#0d6efd;margin-bottom:20px}
.tabs{display:flex;gap:10px;margin-bottom:15px}
.tab{flex:1;padding:12px;background:#e9ecef;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.tab.active{background:#0d6efd;color:#fff}
.user-info{display:flex;justify-content:space-between;align-items:center}
.logout{background:#dc3545;color:#fff;padding:8px 15px;font-size:14px;width:auto;margin-top:0}
.badge{background:#0d6efd;color:#fff;padding:3px 8px;border-radius:12px;font-size:12px;margin-left:8px}
</style>
</head>

<body>

<div class="container">

<h2>🚖 APP TÀI XẾ</h2>

<div id="userBox"></div>

<div class="tabs">
    <button class="tab active" onclick="showTab('my')">📋 Chuyến của tôi</button>
    <button class="tab" onclick="showTab('available')">🆕 Chuyến mới</button>
</div>

<div id="list"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycby4v6G0suvi5jUrGj7FPovr6XQGx9TOcr6Z0tP29N-2RL7yfvBlFobzi-rCLfQO1tLs8Q/exec";

const user = JSON.parse(localStorage.getItem("driver") || "null");

if(!user){
    alert("Chưa đăng nhập. Vui lòng đăng nhập lại.");
    location.href = "taixe.html";
}

let currentTab = "my";

document.getElementById("userBox").innerHTML = `
<div class="card">
    <div class="user-info">
        <div>
            👤 <b>${user.hoTen}</b><br>
            📞 ${user.sdt}
        </div>
        <button class="logout" onclick="logout()">🚪 Đăng xuất</button>
    </div>
</div>`;

function logout(){
    localStorage.removeItem("driver");
    location.href = "taixe.html";
}

function showTab(tab){
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
        if((tab === 'my' && i === 0) || (tab === 'available' && i === 1)){
            t.classList.add('active');
        } else {
            t.classList.remove('active');
        }
    });
    load();
}

async function load(){

    const res = await fetch(API + "?action=getBookings");
    const json = await res.json();
    
    if(!json.success){
        document.getElementById("list").innerHTML = "<div class='card'>❌ Lỗi tải dữ liệu</div>";
        return;
    }
    
    let data = json.data || [];
    
    // Chuyến của tôi: đã được phân công hoặc đang xử lý
    if(currentTab === "my"){
        data = data.filter(x => x.sdtTaiXe == user.sdt);
    } 
    // Chuyến mới: chưa có tài xế và trạng thái "Chờ xác nhận"
    else {
        data = data.filter(x => (!x.sdtTaiXe || x.sdtTaiXe === "") && x.trangThai === "Chờ xác nhận");
    }
    
    let html = "";
    
    data.forEach(x => {
        let statusClass = "";
        if(x.trangThai === "Chờ xác nhận") statusClass = "status-choxacnhan";
        else if(x.trangThai === "Đã nhận") statusClass = "status-danhan";
        else if(x.trangThai === "Đang chở") statusClass = "status-dangcho";
        else if(x.trangThai === "Hoàn thành") statusClass = "status-hoanthanh";
        
        html += `
        <div class="card" id="card-${x.id}">
            <b>👤 ${x.hoTen}</b><br>
            📞 ${x.sdt}<br>
            📍 ${x.diemDi} → ${x.diemDen}<br>
            📅 ${x.ngayDi} lúc ${x.gioDi}<br>
            <div class="status ${statusClass}">📌 ${x.trangThai}</div>
            
            <div class="row">
                <a href="tel:${x.sdt}" style="flex:1">
                    <button class="call">📞 Gọi khách</button>
                </a>
                <a href="https://www.google.com/maps/search/${encodeURIComponent(x.diemDi)}" target="_blank" style="flex:1">
                    <button class="map">🗺️ Maps</button>
                </a>
            </div>`;
        
        // Nút chức năng theo từng tab
        if(currentTab === "available"){
            html += `<button class="btn" onclick="nhanChuyen('${x.id}')">✅ NHẬN CHUYẾN</button>`;
        } else {
            if(x.trangThai === "Đã nhận"){
                html += `<button class="btn btn-warning" onclick="updateStatus('${x.id}','Đang chở')">🚗 BẮT ĐẦU CHỞ</button>`;
            } else if(x.trangThai === "Đang chở"){
                html += `<button class="btn btn-success" onclick="updateStatus('${x.id}','Hoàn thành')">✅ HOÀN THÀNH</button>`;
            } else if(x.trangThai === "Hoàn thành"){
                html += `<div style="margin-top:10px;color:#28a745;text-align:center">✔️ Đã hoàn thành</div>`;
            } else if(x.trangThai === "Chờ xác nhận" && !x.sdtTaiXe){
                html += `<button class="btn" onclick="nhanChuyen('${x.id}')">✅ NHẬN CHUYẾN</button>`;
            }
        }
        
        html += `</div>`;
    });
    
    document.getElementById("list").innerHTML = html || `<div class="card">📭 Không có chuyến nào</div>`;
}

// Nhận chuyến mới
async function nhanChuyen(id){
    if(!confirm("Bạn muốn nhận chuyến này?")) return;
    
    const btn = event.target;
    btn.textContent = "⏳ Đang xử lý...";
    btn.disabled = true;
    
    try{
        const res = await fetch(API, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                action: "updateBooking",
                id: id,
                trangThai: "Đã nhận",
                taiXe: user.hoTen,
                sdtTaiXe: user.sdt
            })
        });
        
        const result = await res.json();
        
        if(result.success){
            alert("✅ Nhận chuyến thành công!");
            load();
        } else {
            alert("❌ Lỗi: " + result.message);
            btn.textContent = "✅ NHẬN CHUYẾN";
            btn.disabled = false;
        }
    } catch(err){
        alert("❌ Lỗi kết nối: " + err.message);
        btn.textContent = "✅ NHẬN CHUYẾN";
        btn.disabled = false;
    }
}

// Cập nhật trạng thái chuyến (đang chở/hoàn thành)
async function updateStatus(id, status){
    let msg = "";
    if(status === "Đang chở") msg = "Bắt đầu chở khách?";
    else if(status === "Hoàn thành") msg = "Xác nhận hoàn thành chuyến?";
    
    if(!confirm(msg)) return;
    
    try{
        const res = await fetch(API, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                action: "updateBooking",
                id: id,
                trangThai: status
            })
        });
        
        const result = await res.json();
        
        if(result.success){
            alert(`✅ Đã cập nhật: ${status}`);
            load();
        } else {
            alert("❌ Lỗi: " + result.message);
        }
    } catch(err){
        alert("❌ Lỗi kết nối: " + err.message);
    }
}

// Tự động refresh mỗi 10 giây
load();
setInterval(load, 10000);

</script>

</body>
</html>
