<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App tài xế</title>

<style>
body{font-family:Arial;background:#f3f4f6;padding:15px}
.container{max-width:800px;margin:auto}

.card{background:#fff;padding:15px;margin-top:15px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}

button{padding:10px;border:none;border-radius:8px;cursor:pointer;margin-top:5px}

.btn{width:100%;background:#0d6efd;color:#fff}
.call{background:#198754;color:#fff;width:48%}
.map{background:#0dcaf0;width:48%}

.row{display:flex;justify-content:space-between;margin-top:10px}

.status{padding:5px 10px;background:#eee;border-radius:20px;display:inline-block;margin-top:5px}

h2{text-align:center;color:#0d6efd}
</style>
</head>

<body>

<div class="container">

<h2>🚖 APP TÀI XẾ</h2>

<div id="userBox"></div>

<div id="list"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycby4v6G0suvi5jUrGj7FPovr6XQGx9TOcr6Z0tP29N-2RL7yfvBlFobzi-rCLfQO1tLs8Q/exec";

const user = JSON.parse(localStorage.getItem("driver") || "null");

if(!user){
  alert("Chưa đăng nhập");
  location.href = "taixe.html";
}

document.getElementById("userBox").innerHTML =
`<div class="card">
👤 <b>${user.hoTen}</b><br>
📞 ${user.sdt}
</div>`;

async function load(){

  const res = await fetch(API + "?action=getBookings");
  const json = await res.json();

  const data = json.data.filter(x => x.sdtTaiXe == user.sdt);

  let html = "";

  data.forEach(x => {

    html += `
    <div class="card">

      <b>👤 ${x.hoTen}</b><br>
      📞 ${x.sdt}<br>
      📍 ${x.diemDi} → ${x.diemDen}<br>
      📅 ${x.ngayDi} ${x.gioDi}<br>

      <div class="status">${x.trangThai}</div>

      <div class="row">
        <a href="tel:${x.sdt}">
          <button class="call">📞 Gọi</button>
        </a>

        <a href="https://www.google.com/maps/search/${x.diemDi}" target="_blank">
          <button class="map">🗺️ Maps</button>
        </a>
      </div>

      <button class="btn" onclick="update('${x.id}','Đã nhận')">🚕 Nhận</button>
      <button class="btn" onclick="update('${x.id}','Đang chở')">🚗 Đang chở</button>
      <button class="btn" onclick="update('${x.id}','Hoàn thành')">✅ Hoàn thành</button>

    </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "<div class='card'>Không có chuyến</div>";
}

async function update(id,status){

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"updateBooking",
      id:id,
      trangThai:status
    })
  });

  load();
}

load();
setInterval(load,5000);

</script>

</body>
</html>
