<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tài xế PRO</title>

<style>
body{font-family:Arial;background:#f3f4f6;margin:0;padding:15px}
.container{max-width:900px;margin:auto}
h1{text-align:center;color:#0d6efd}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
input{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px}
button{padding:10px;border:none;border-radius:8px;cursor:pointer}
.btn{width:100%;background:#0d6efd;color:#fff;margin-top:10px}
.row{display:flex;gap:10px;margin-top:10px}
.call{background:#198754;color:#fff;flex:1}
.map{background:#0dcaf0;color:#000;flex:1}
.status{display:inline-block;padding:5px 10px;border-radius:20px;background:#eee;margin-top:5px}
.small{font-size:14px;color:#333}
</style>
</head>

<body>

<div class="container">

<h1>🚖 TÀI XẾ PRO</h1>

<div class="card">
<label>SĐT tài xế</label>
<input id="sdtTaiXe" placeholder="Nhập số điện thoại">
<button class="btn" onclick="login()">Đăng nhập</button>
</div>

<div id="list"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycby4v6G0suvi5jUrGj7FPovr6XQGx9TOcr6Z0tP29N-2RL7yfvBlFobzi-rCLfQO1tLs8Q/exec";

let DATA = [];

function login(){
  const sdt = document.getElementById("sdtTaiXe").value.trim();
  if(!sdt) return alert("Nhập SĐT tài xế");

  localStorage.setItem("sdtTaiXe", sdt);
  loadData();
}

async function loadData(){
  const res = await fetch(API);
  const json = await res.json();

  const sdt = localStorage.getItem("sdtTaiXe");

  DATA = json.data.filter(x => x.sdtTaiXe == sdt);

  render();
}

function render(){
  const el = document.getElementById("list");

  if(DATA.length === 0){
    el.innerHTML = "<div class='card'>Không có chuyến</div>";
    return;
  }

  let html = "";

  DATA.forEach(x => {

    const map = `https://www.google.com/maps/search/${x.diemDi}`;

    html += `
    <div class="card">
      <div><b>👤 ${x.hoTen}</b></div>
      <div class="small">📞 ${x.sdt}</div>
      <div class="small">📍 ${x.diemDi} → ${x.diemDen}</div>
      <div class="small">📅 ${x.ngayDi} ${x.gioDi}</div>

      <div class="status">${x.trangThai}</div>

      <div class="row">
        <a href="tel:${x.sdt}" style="flex:1">
          <button class="call" style="width:100%">📞 Gọi</button>
        </a>

        <a href="${map}" target="_blank" style="flex:1">
          <button class="map" style="width:100%">🗺️ Maps</button>
        </a>
      </div>

      <div class="row">
        <button class="btn" onclick="update('${x.id}','Đã nhận')">🚕 Nhận</button>
      </div>

      <div class="row">
        <button class="btn" onclick="update('${x.id}','Đang chở')">🚗 Đang chở</button>
      </div>

      <div class="row">
        <button class="btn" onclick="update('${x.id}','Hoàn thành')">✅ Hoàn thành</button>
      </div>

    </div>
    `;
  });

  el.innerHTML = html;
}

async function update(id, status){

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "update",
      id: id,
      trangThai: status
    })
  });

  loadData();
}

setInterval(() => {
  if(localStorage.getItem("sdtTaiXe")){
    loadData();
  }
}, 5000);

window.onload = loadData;

</script>

</body>
</html>
