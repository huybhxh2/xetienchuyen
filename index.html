<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Đặt xe - Xem danh sách điểm có sẵn</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%); padding: 20px; min-height: 100vh; }
    .container { max-width: 750px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; }
    .header { background: #0d6efd; padding: 24px 28px; color: white; }
    .header h1 { font-size: 1.9rem; display: flex; align-items: center; gap: 12px; justify-content: space-between; }
    .badge { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 40px; font-size: 0.85rem; }
    .content { padding: 28px; }
    .form-group { margin-bottom: 20px; position: relative; }
    label { font-weight: 600; display: block; margin-bottom: 8px; color: #1e293b; }
    input { width: 100%; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 20px; font-size: 1rem; transition: 0.2s; }
    input:focus { outline: none; border-color: #0d6efd; box-shadow: 0 0 0 4px rgba(13,110,253,0.15); }
    .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 20px 20px; max-height: 250px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .autocomplete-list div { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
    .autocomplete-list div:hover { background: #0d6efd; color: white; }
    .btn-group { display: flex; gap: 12px; margin: 25px 0 15px; }
    button { background: #0d6efd; color: white; border: none; padding: 12px 18px; border-radius: 40px; font-weight: bold; font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    button:hover { background: #0b5ed7; }
    .btn-outline { background: white; color: #0d6efd; border: 1.5px solid #0d6efd; }
    .card-result { background: #f8fafc; border-radius: 28px; padding: 20px; margin: 20px 0; border-left: 6px solid #0d6efd; }
    .price-row { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #cbd5e1; }
    .price-tc { font-size: 1.7rem; font-weight: 800; color: #0d6efd; }
    .price-bx { font-size: 1.7rem; font-weight: 800; color: #dc2626; }
    .radio-group { background: #f1f5f9; padding: 12px 18px; border-radius: 60px; display: inline-flex; gap: 24px; margin: 10px 0 20px; }
    .radio-group label { display: inline-flex; align-items: center; gap: 8px; font-weight: 500; margin: 0; }
    hr { margin: 28px 0; border: none; height: 2px; background: linear-gradient(to right, #cbd5e1, transparent); }
    .toast-message { margin-top: 20px; padding: 14px; border-radius: 60px; text-align: center; font-weight: 500; }
    .success { background: #dcfce7; color: #15803d; border-left: 5px solid #22c55e; }
    .error { background: #fee2e2; color: #b91c1c; border-left: 5px solid #ef4444; }
    .loading { background: #fff3cd; color: #856404; }
    .info-box { background: #e0f2fe; padding: 12px; border-radius: 16px; margin-bottom: 20px; font-size: 0.85rem; color: #0369a1; }
    .point-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .point-tag { background: #e2e8f0; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; color: #1e293b; cursor: pointer; transition: 0.2s; }
    .point-tag:hover { background: #0d6efd; color: white; }
    .note { font-size: 0.75rem; text-align: center; color: #64748b; margin-top: 24px; }
    footer { background: #f8fafc; text-align: center; padding: 16px; font-size: 0.75rem; color: #475569; border-top: 1px solid #e2e8f0; }
    @media (max-width: 550px) { .content { padding: 20px; } .price-tc, .price-bx { font-size: 1.3rem; } }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🚖 Vận tải kết nối<span class="badge">Tiện chuyến · Bao xe</span></h1>
        <p style="margin-top: 8px; opacity: 0.9;">📋 Click vào ô để xem danh sách điểm có sẵn</p>
    </div>
    <div class="content">
        <div class="info-box" id="infoBox">
            ⏳ Đang tải danh sách điểm từ Google Sheet...
        </div>

        <div class="form-group">
            <label>📍 Điểm đi</label>
            <div class="input-wrapper">
                <input type="text" id="diemDi" placeholder="Nhập hoặc chọn từ danh sách bên dưới" autocomplete="off">
                <div id="autocompleteDi" class="autocomplete-list"></div>
            </div>
        </div>

        <div class="form-group">
            <label>📍 Điểm đến</label>
            <div class="input-wrapper">
                <input type="text" id="diemDen" placeholder="Nhập hoặc chọn từ danh sách bên dưới" autocomplete="off">
                <div id="autocompleteDen" class="autocomplete-list"></div>
            </div>
        </div>

        <div class="btn-group">
            <button id="btnTraCuu" style="flex:2">🔍 Tra cứu giá</button>
            <button id="btnDoiViTri" class="btn-outline" style="flex:1">🔄 Đổi chiều</button>
        </div>

        <div id="ketQuaContainer"></div>
        <hr />
        <h3 style="margin-bottom: 16px;">✍️ Đặt xe ngay</h3>

        <div class="radio-group">
            <label><input type="radio" name="loaiXe" value="tien_chuyen" checked> 🚗 Tiện chuyến</label>
            <label><input type="radio" name="loaiXe" value="bao_xe"> 🚙 Bao xe</label>
        </div>

        <div class="form-group"><label>👤 Họ và tên</label><input type="text" id="hoTen" placeholder="Nguyễn Văn A"></div>
        <div class="form-group"><label>📞 Số điện thoại</label><input type="tel" id="sdt" placeholder="0912345678"></div>
        <div class="form-group"><label>📧 Email</label><input type="email" id="email" placeholder="example@gmail.com"></div>
        
        <div style="display: flex; gap: 12px;">
            <div style="flex:1"><label>📅 Ngày đi</label><input type="date" id="ngayDi"></div>
            <div style="flex:1"><label>⏰ Giờ đi</label><input type="time" id="gioDi"></div>
        </div>

        <button id="btnDatXe" style="width: 100%; margin-top: 24px;">🚀 Xác nhận đặt xe</button>
        <div id="thongBao"></div>
        <div class="note">* Đặt xe thành công sẽ được ghi vào Google Sheet quản lý.</div>
    </div>
    <footer>⚡ Bảng giá được cập nhật tự động từ Google Sheet</footer>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1ql2Aruz-GCF8lAInY-b_b72d74vazyhM2-wwSiCCNNQ/export?format=csv";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzkIQhjOZ2Tg7K9Pml9XnsUlMvcIfjCdUAJwN3fRZPqlIya34wHqc3UeXFowJbTgBbqGg/exec";
    
    let danhSachTuyen = [];
    let danhSachDiaDanh = [];
    
    const diemDiInput = document.getElementById('diemDi');
    const diemDenInput = document.getElementById('diemDen');
    const autoDiDiv = document.getElementById('autocompleteDi');
    const autoDenDiv = document.getElementById('autocompleteDen');
    const ketQuaDiv = document.getElementById('ketQuaContainer');
    const thongBaoDiv = document.getElementById('thongBao');
    const infoBox = document.getElementById('infoBox');
    
    function normalizePlace(str) {
        if (!str) return "";
        return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/Đ/g, "D").replace(/\s+/g, " ").trim();
    }
    
    async function loadDataFromSheet() {
        try {
            infoBox.innerHTML = '⏳ Đang tải dữ liệu từ Google Sheet...';
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error("Không thể tải CSV");
            const csvText = await response.text();
            
            const rows = parseCSV(csvText);
            if (rows.length < 2) throw new Error("CSV không có dữ liệu");
            
            const headers = rows[0].map(h => h.trim().toLowerCase());
            const idxDi = headers.findIndex(h => h === "điểm đi");
            const idxDen = headers.findIndex(h => h === "điểm đến");
            const idxKm = headers.findIndex(h => h === "số km");
            const idxGiaTc = headers.findIndex(h => h === "giá tiện chuyến");
            const idxGiaBx = headers.findIndex(h => h === "giá bao xe");
            
            if ([idxDi, idxDen, idxKm, idxGiaTc, idxGiaBx].some(i => i === -1)) {
                throw new Error("Cấu trúc cột không đúng. Cần: Điểm đi, Điểm đến, số km, Giá tiện chuyến, Giá bao xe");
            }
            
            danhSachTuyen = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length < 5) continue;
                const diemDi = row[idxDi]?.trim();
                const diemDen = row[idxDen]?.trim();
                if (!diemDi || !diemDen) continue;
                
                let kmRaw = row[idxKm].replace(/[^0-9.-]/g, '');
                let giaTcRaw = row[idxGiaTc].replace(/[^0-9.-]/g, '');
                let giaBxRaw = row[idxGiaBx].replace(/[^0-9.-]/g, '');
                
                danhSachTuyen.push({
                    diemDi: diemDi,
                    diemDen: diemDen,
                    km: parseFloat(kmRaw) || 0,
                    giaTienChuyen: parseFloat(giaTcRaw) || 0,
                    giaBaoXe: parseFloat(giaBxRaw) || 0,
                });
            }
            
            if (danhSachTuyen.length === 0) {
                infoBox.innerHTML = '❌ Không tìm thấy tuyến xe nào. Kiểm lại sheet!';
                return;
            }
            
            const diaDanhSet = new Set();
            danhSachTuyen.forEach(t => { diaDanhSet.add(t.diemDi); diaDanhSet.add(t.diemDen); });
            danhSachDiaDanh = Array.from(diaDanhSet).sort((a,b) => a.localeCompare(b, 'vi'));
            
            // Hiển thị danh sách điểm có sẵn dạng tag
            infoBox.innerHTML = `
                <strong>✅ Đã tải ${danhSachTuyen.length} tuyến xe | ${danhSachDiaDanh.length} điểm</strong>
                <div class="point-list" id="pointList">
                    ${danhSachDiaDanh.map(point => `<span class="point-tag" data-point="${point}">${point}</span>`).join('')}
                </div>
                <small style="display:block; margin-top:8px;">💡 Click vào tên điểm để chọn nhanh</small>
            `;
            
            // Gắn sự kiện click cho các tag
            document.querySelectorAll('.point-tag').forEach(tag => {
                tag.addEventListener('click', (e) => {
                    const point = tag.getAttribute('data-point');
                    if (document.activeElement === diemDiInput || diemDiInput.value === "") {
                        diemDiInput.value = point;
                    } else {
                        diemDenInput.value = point;
                    }
                    traCuuGia();
                });
            });
            
            setupAutocomplete(diemDiInput, autoDiDiv);
            setupAutocomplete(diemDenInput, autoDenDiv);
            
        } catch (error) {
            console.error(error);
            infoBox.innerHTML = `<div class="toast-message error">❌ Lỗi: ${error.message}</div>`;
        }
    }
    
    function parseCSV(csvString) {
        const rows = [];
        const lines = csvString.split(/\r?\n/);
        for (let line of lines) {
            if (line.trim() === "") continue;
            const row = [];
            let inQuote = false;
            let current = '';
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuote = !inQuote;
                else if (char === ',' && !inQuote) { row.push(current.trim()); current = ''; }
                else current += char;
            }
            row.push(current.trim());
            rows.push(row);
        }
        return rows;
    }
    
    function setupAutocomplete(inputElement, listElement) {
        inputElement.addEventListener('input', function(e) {
            const keyword = this.value.toLowerCase().trim();
            listElement.innerHTML = '';
            let filtered = keyword === "" ? danhSachDiaDanh.slice(0, 15) : danhSachDiaDanh.filter(p => p.toLowerCase().includes(keyword) || normalizePlace(p).includes(normalizePlace(keyword)));
            if (filtered.length === 0) {
                const div = document.createElement('div');
                div.textContent = '📭 Không tìm thấy điểm nào';
                div.style.color = '#94a3b8';
                div.style.cursor = 'default';
                listElement.appendChild(div);
            } else {
                filtered.forEach(place => {
                    const div = document.createElement('div');
                    div.textContent = place;
                    div.addEventListener('click', () => { inputElement.value = place; listElement.style.display = 'none'; traCuuGia(); });
                    listElement.appendChild(div);
                });
            }
            listElement.style.display = filtered.length > 0 ? 'block' : 'none';
        });
        
        inputElement.addEventListener('focus', () => {
            if (danhSachDiaDanh.length > 0) inputElement.dispatchEvent(new Event('input'));
        });
        
        document.addEventListener('click', (e) => {
            if (!inputElement.contains(e.target) && !listElement.contains(e.target)) listElement.style.display = 'none';
        });
    }
    
    function traCuuGia() {
        let di = diemDiInput.value.trim();
        let den = diemDenInput.value.trim();
        if (!di || !den) { ketQuaDiv.innerHTML = '<div class="toast-message error">❗ Vui lòng nhập điểm đi và đến</div>'; return; }
        if (normalizePlace(di) === normalizePlace(den)) { ketQuaDiv.innerHTML = '<div class="toast-message error">📍 Điểm đi và đến không thể trùng</div>'; return; }
        
        const diNorm = normalizePlace(di), denNorm = normalizePlace(den);
        const tuyen = danhSachTuyen.find(t => (normalizePlace(t.diemDi) === diNorm && normalizePlace(t.diemDen) === denNorm) || (normalizePlace(t.diemDi) === denNorm && normalizePlace(t.diemDen) === diNorm));
        
        if (!tuyen) {
            ketQuaDiv.innerHTML = `<div class="toast-message error">🚫 Không tìm thấy tuyến: ${di} → ${den}<br><br>📋 Các điểm có sẵn: ${danhSachDiaDanh.join(', ')}</div>`;
            window.lastQueriedRoute = null;
            return;
        }
        
        const formatVND = (num) => num.toLocaleString('vi-VN') + 'đ';
        ketQuaDiv.innerHTML = `
            <div class="card-result">
                <div><strong>🚩 Điểm đi:</strong> ${tuyen.diemDi}</div>
                <div><strong>🏁 Điểm đến:</strong> ${tuyen.diemDen}</div>
                <div><strong>🛣️ Quãng đường:</strong> ${tuyen.km} km</div>
                <div class="price-row"><span>🚗 Tiện chuyến</span><span class="price-tc">${formatVND(tuyen.giaTienChuyen)}</span></div>
                <div class="price-row"><span>🚙 Bao xe</span><span class="price-bx">${formatVND(tuyen.giaBaoXe)}</span></div>
            </div>`;
        window.lastQueriedRoute = tuyen;
    }
    
    function doiViTri() { const temp = diemDiInput.value; diemDiInput.value = diemDenInput.value; diemDenInput.value = temp; traCuuGia(); }
    
    async function datXe() {
        const hoTen = document.getElementById('hoTen').value.trim(), sdt = document.getElementById('sdt').value.trim(), email = document.getElementById('email').value.trim();
        const ngayDi = document.getElementById('ngayDi').value, gioDi = document.getElementById('gioDi').value, diemDi = diemDiInput.value.trim(), diemDen = diemDenInput.value.trim();
        const loaiXe = document.querySelector('input[name="loaiXe"]:checked').value;
        if (!hoTen || !sdt || !ngayDi || !gioDi) { alert("Vui lòng nhập đủ thông tin"); return; }
        
        let tuyen = window.lastQueriedRoute;
        if (!tuyen) { alert("Vui lòng tra cứu giá trước khi đặt"); return; }
        
        const loaiXeText = loaiXe === "tien_chuyen" ? "Tiện chuyến" : "Bao xe";
        const giaTri = loaiXe === "tien_chuyen" ? tuyen.giaTienChuyen : tuyen.giaBaoXe;
        if (!confirm(`XÁC NHẬN ĐẶT XE ${loaiXeText}\n👤 ${hoTen} - ${sdt}\n🚏 ${diemDi} → ${diemDen}\n📅 ${ngayDi} ${gioDi}\n💰 Giá: ${giaTri.toLocaleString('vi-VN')}đ`)) return;
        
        thongBaoDiv.innerHTML = '⏳ Đang gửi...'; thongBaoDiv.className = 'toast-message loading';
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'createBooking', hoTen, sdt, email, diemDi, diemDen, ngayDi, gioDi, loaiXe: loaiXeText, giaTri, timestamp: new Date().toISOString() }) });
            thongBaoDiv.innerHTML = '✅ Đặt xe thành công!'; thongBaoDiv.className = 'toast-message success';
            document.getElementById('hoTen').value = ''; document.getElementById('sdt').value = ''; document.getElementById('email').value = '';
            setTimeout(() => { thongBaoDiv.innerHTML = ''; }, 5000);
        } catch(err) { thongBaoDiv.innerHTML = '❌ Lỗi kết nối'; thongBaoDiv.className = 'toast-message error'; }
    }
    
    function setDefaultDateTime() {
        const today = new Date();
        document.getElementById('ngayDi').value = today.toISOString().split('T')[0];
        document.getElementById('gioDi').value = '08:00';
    }
    
    document.getElementById('btnTraCuu').addEventListener('click', traCuuGia);
    document.getElementById('btnDoiViTri').addEventListener('click', doiViTri);
    document.getElementById('btnDatXe').addEventListener('click', datXe);
    
    loadDataFromSheet().then(setDefaultDateTime);
</script>
</body>
</html>
