<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt xe - Tiện chuyến & Bao xe</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    border-radius:15px;
    padding:25px;
    box-shadow:0 3px 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#0d6efd;
    margin-bottom:25px;
}

h2{
    color:#0d6efd;
    margin:25px 0 15px;
    border-left:5px solid #0d6efd;
    padding-left:15px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
    color:#333;
}

select, input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    transition:0.2s;
}

select:focus, input:focus{
    border-color:#0d6efd;
    outline:none;
    box-shadow:0 0 0 2px rgba(13,110,253,0.2);
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    background:#0b5ed7;
    transform:translateY(-1px);
}

.loai-xe{
    background:#f8f9fa;
    border-radius:10px;
    padding:15px;
    margin:15px 0;
}

.loai-xe label{
    display:inline-block;
    margin-right:20px;
    font-weight:normal;
    cursor:pointer;
}

.loai-xe input[type="radio"]{
    width:auto;
    margin-right:5px;
}

#ketqua{
    margin-top:20px;
}

.card{
    background:#eef6ff;
    border-radius:10px;
    padding:15px;
    border-left:4px solid #0d6efd;
}

.dong{
    margin:8px 0;
    font-size:18px;
}

.gia-tien-chuyen{
    color:#0d6efd;
    font-size:22px;
    font-weight:bold;
}

.gia-bao-xe{
    color:#dc3545;
    font-size:24px;
    font-weight:bold;
}

#thongBao{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    padding:12px;
    border-radius:8px;
}

.thongbao-thanhcong{
    background:#d1e7dd;
    color:#0f5132;
}

.thongbao-loi{
    background:#f8d7da;
    color:#842029;
}

.thongbao-loading{
    background:#fff3cd;
    color:#664d03;
}

hr{
    margin:30px 0;
    border:0;
    height:1px;
    background:linear-gradient(to right, #ccc, transparent);
}

.note{
    font-size:12px;
    color:#6c757d;
    margin-top:5px;
    text-align:center;
}

.flex-row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.btn-secondary{
    background:#6c757d;
    margin-top:0;
}

.btn-secondary:hover{
    background:#5c636a;
}
</style>
</head>
<body>

<div class="container">

<h1>🚖 TRA CỨU GIÁ XE</h1>

<label>📍 Điểm đi</label>
<select id="diemDi"></select>

<label>📍 Điểm đến</label>
<select id="diemDen"></select>

<div class="flex-row">
    <button onclick="traCuu()" style="flex:1">🔍 Tra cứu giá</button>
    <button onclick="doiViTri()" class="btn-secondary" style="flex:0.3">🔄 Đổi</button>
</div>

<div id="ketqua"></div>

<hr>

<h2>📝 ĐẶT XE</h2>

<div class="loai-xe">
    <label>
        <input type="radio" name="loaiXe" value="tien_chuyen" checked> 🚗 Xe tiện chuyến
    </label>
    <label>
        <input type="radio" name="loaiXe" value="bao_xe"> 🚙 Xe bao (riêng)
    </label>
</div>

<label>👤 Họ và tên</label>
<input type="text" id="hoTen" placeholder="VD: Nguyễn Văn A">

<label>📞 Số điện thoại</label>
<input type="tel" id="sdt" placeholder="0912345678">

<label>📅 Ngày đi</label>
<input type="date" id="ngayDi">

<label>⏰ Giờ đi</label>
<input type="time" id="gioDi">

<button onclick="datXe()">
🚖 Đặt xe ngay
</button>

<div id="thongBao"></div>
<div class="note">* Đặt xe thành công sẽ được ghi vào Google Sheet quản lý</div>

</div>

<script>

// LINK CSV GOOGLE SHEET TUYẾN XE (bảng giá)
const csvUrl =
"https://docs.google.com/spreadsheets/d/1ql2Aruz-GCF8lAInY-b_b72d74vazyhM2-wwSiCCNNQ/gviz/tq?tqx=out:csv";

// LINK APPS SCRIPT (đặt xe)
const scriptUrl =
"https://script.google.com/macros/s/AKfycby4v6G0suvi5jUrGj7FPovr6XQGx9TOcr6Z0tP29N-2RL7yfvBlFobzi-rCLfQO1tLs8Q/exec";

let duLieu = []; // Lưu dữ liệu bảng giá

// ==================== TẢI BẢNG GIÁ ====================
async function loadData(){
    try{
        const ketquaDiv = document.getElementById("ketqua");
        if(ketquaDiv) ketquaDiv.innerHTML = "<p style='text-align:center'>⏳ Đang tải dữ liệu tuyến xe...</p>";
        
        const response = await fetch(csvUrl);
        const text = await response.text();

        const rows = text.trim().split("\n");
        duLieu = [];

        for(let i=1; i<rows.length; i++){
            const row = rows[i];
            const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
            if(!cols || cols.length < 5) continue;
            
            let diemDi = cols[0].replace(/"/g,"").trim();
            let diemDen = cols[1].replace(/"/g,"").trim();
            let km = cols[2].replace(/"/g,"").trim();
            let giaTienChuyen = cols[3].replace(/"/g,"").trim();
            let giaBaoXe = cols[4].replace(/"/g,"").trim();
            
            if(diemDi === "" || diemDen === "") continue;
            
            duLieu.push({
                diemDi: diemDi,
                diemDen: diemDen,
                km: km,
                giaTienChuyen: giaTienChuyen,
                giaBaoXe: giaBaoXe
            });
        }
        
        if(duLieu.length === 0){
            document.getElementById("ketqua").innerHTML = "<p style='color:red'>⚠️ Không tìm thấy dữ liệu tuyến xe.</p>";
        } else {
            taoDanhSachDiaDiem();
            document.getElementById("ketqua").innerHTML = "";
        }
        
    }catch(err){
        document.getElementById("ketqua").innerHTML =
        "<p style='color:red;text-align:center'>❌ Không tải được dữ liệu bảng giá.</p>";
        console.error(err);
    }
}

// Tạo danh sách địa điểm cho dropdown
function taoDanhSachDiaDiem(){
    const diaDanhSet = new Set();
    duLieu.forEach(tuyen => {
        diaDanhSet.add(tuyen.diemDi);
        diaDanhSet.add(tuyen.diemDen);
    });
    
    const ds = Array.from(diaDanhSet).sort((a,b) => a.localeCompare(b, 'vi'));
    
    const diemDi = document.getElementById("diemDi");
    const diemDen = document.getElementById("diemDen");
    
    diemDi.innerHTML = "";
    diemDen.innerHTML = "";
    
    ds.forEach(item => {
        diemDi.innerHTML += `<option value="${item}">${item}</option>`;
        diemDen.innerHTML += `<option value="${item}">${item}</option>`;
    });
}

// Đổi vị trí điểm đi và điểm đến
function doiViTri(){
    const diemDi = document.getElementById("diemDi");
    const diemDen = document.getElementById("diemDen");
    const tam = diemDi.value;
    diemDi.value = diemDen.value;
    diemDen.value = tam;
    traCuu();
}

// Tra cứu giá
function traCuu(){
    const di = document.getElementById("diemDi").value;
    const den = document.getElementById("diemDen").value;
    
    if(!di || !den){
        document.getElementById("ketqua").innerHTML = "<h3 style='color:red;text-align:center'>⚠️ Vui lòng chọn đầy đủ điểm đi và điểm đến</h3>";
        return;
    }
    
    if(di === den){
        document.getElementById("ketqua").innerHTML = "<h3 style='color:orange;text-align:center'>📍 Điểm đi và điểm đến không thể trùng nhau</h3>";
        return;
    }
    
    const tuyen = duLieu.find(x => 
        (x.diemDi === di && x.diemDen === den) ||
        (x.diemDi === den && x.diemDen === di)
    );
    
    if(!tuyen){
        document.getElementById("ketqua").innerHTML = 
        "<div style='background:#fff3cd;border-radius:10px;padding:15px;text-align:center'>🚫 Không tìm thấy tuyến xe từ <b>" + di + "</b> đến <b>" + den + "</b></div>";
        return;
    }
    
    let giaTC = Number(String(tuyen.giaTienChuyen).replace(/,/g, "").trim());
    let giaBX = Number(String(tuyen.giaBaoXe).replace(/,/g, "").trim());
    if(isNaN(giaTC)) giaTC = 0;
    if(isNaN(giaBX)) giaBX = 0;
    
    document.getElementById("ketqua").innerHTML = `
    <div class="card">
        <div class="dong">📍 Điểm đi: <b>${di}</b></div>
        <div class="dong">📍 Điểm đến: <b>${den}</b></div>
        <div class="dong">🛣️ Quãng đường: <b>${tuyen.km} km</b></div>
        <hr style="margin:10px 0">
        <div class="dong gia-tien-chuyen">🚗 Tiện chuyến: ${giaTC.toLocaleString("vi-VN")}đ</div>
        <div class="dong gia-bao-xe">🚙 Bao xe (riêng): ${giaBX.toLocaleString("vi-VN")}đ</div>
    </div>`;
}

// ==================== ĐẶT XE (GỌI APPS SCRIPT) ====================
async function datXe(){
    const hoTen = document.getElementById("hoTen").value.trim();
    const sdt = document.getElementById("sdt").value.trim();
    const ngayDi = document.getElementById("ngayDi").value;
    const gioDi = document.getElementById("gioDi").value;
    const diemDi = document.getElementById("diemDi").value;
    const diemDen = document.getElementById("diemDen").value;
    const loaiXeRadio = document.querySelector('input[name="loaiXe"]:checked');
    const loaiXe = loaiXeRadio ? loaiXeRadio.value : "tien_chuyen";
    
    // Kiểm tra thông tin
    if(!hoTen || !sdt || !ngayDi || !gioDi){
        alert("Vui lòng nhập đầy đủ họ tên, số điện thoại, ngày đi và giờ đi");
        return;
    }
    
    if(!diemDi || !diemDen){
        alert("Vui lòng chọn điểm đi và điểm đến");
        return;
    }
    
    if(diemDi === diemDen){
        alert("Điểm đi và điểm đến không thể trùng nhau");
        return;
    }
    
    // Kiểm tra số điện thoại
    const phoneRegex = /^[0-9]{9,11}$/;
    if(!phoneRegex.test(sdt)){
        alert("Số điện thoại không hợp lệ (phải 9-11 chữ số)");
        return;
    }
    
    // Tìm tuyến xe để lấy giá (không bắt buộc nhưng để xác nhận)
    const tuyen = duLieu.find(x => 
        (x.diemDi === diemDi && x.diemDen === diemDen) ||
        (x.diemDi === diemDen && x.diemDen === diemDi)
    );
    
    let loaiXeText = loaiXe === "tien_chuyen" ? "Tiện chuyến" : "Bao xe";
    let giaTri = 0;
    
    if(tuyen){
        if(loaiXe === "tien_chuyen"){
            giaTri = Number(String(tuyen.giaTienChuyen).replace(/,/g, "").trim());
        } else {
            giaTri = Number(String(tuyen.giaBaoXe).replace(/,/g, "").trim());
        }
    }
    
    const confirmMsg = `Xác nhận đặt xe ${loaiXeText}:\n
    Họ tên: ${hoTen}
    SĐT: ${sdt}
    Tuyến: ${diemDi} → ${diemDen}
    Ngày giờ: ${ngayDi} ${gioDi}
    ${giaTri > 0 ? `Giá: ${giaTri.toLocaleString("vi-VN")}đ` : ''}
    
    Nhấn OK để hoàn tất đặt xe.`;
    
    if(!confirm(confirmMsg)) return;
    
    // Hiển thị trạng thái đang gửi
    const thongBaoDiv = document.getElementById("thongBao");
    thongBaoDiv.innerHTML = "⏳ Đang gửi yêu cầu đặt xe...";
    thongBaoDiv.className = "thongbao-loading";
    
    try{
        // Gửi dữ liệu theo đúng format Apps Script yêu cầu (có action: "createBooking")
        const response = await fetch(scriptUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                action: "createBooking",  // QUAN TRỌNG: Apps Script cần action này
                hoTen: hoTen,
                sdt: sdt,
                diemDi: diemDi,
                diemDen: diemDen,
                ngayDi: ngayDi,
                gioDi: gioDi
            })
        });
        
        const result = await response.json();
        
        if(result.success){
            thongBaoDiv.innerHTML = `✅ Đặt xe thành công! Mã đơn: ${result.id || "Đã ghi nhận"}. Chúng tôi sẽ liên hệ xác nhận sớm.`;
            thongBaoDiv.className = "thongbao-thanhcong";
            
            // Reset form
            document.getElementById("hoTen").value = "";
            document.getElementById("sdt").value = "";
            // Giữ nguyên ngày giờ mặc định
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById("ngayDi").value = `${yyyy}-${mm}-${dd}`;
            document.getElementById("gioDi").value = "08:00";
        } else {
            thongBaoDiv.innerHTML = `❌ Đặt xe thất bại: ${result.message || "Lỗi không xác định"}`;
            thongBaoDiv.className = "thongbao-loi";
        }
        
        // Tự động ẩn thông báo sau 5 giây
        setTimeout(() => {
            if(thongBaoDiv.innerHTML.includes("thành công") || thongBaoDiv.innerHTML.includes("thất bại")){
                setTimeout(() => {
                    thongBaoDiv.innerHTML = "";
                    thongBaoDiv.className = "";
                }, 3000);
            }
        }, 5000);
        
    } catch(error){
        console.error("Lỗi đặt xe:", error);
        thongBaoDiv.innerHTML = "❌ Gửi thất bại. Vui lòng kiểm tra kết nối mạng và thử lại.";
        thongBaoDiv.className = "thongbao-loi";
    }
}

// Tự động tra cứu khi thay đổi điểm đi/đến
function autoTraCuu(){
    document.getElementById("diemDi").addEventListener("change", () => traCuu());
    document.getElementById("diemDen").addEventListener("change", () => traCuu());
}

// Khởi tạo
window.addEventListener("DOMContentLoaded", () => {
    loadData().then(() => {
        autoTraCuu();
    });
    
    // Set ngày mặc định là hôm nay
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    const ngayDiInput = document.getElementById("ngayDi");
    if(ngayDiInput) ngayDiInput.value = `${yyyy}-${mm}-${dd}`;
    
    // Set giờ mặc định là 8:00
    const gioDiInput = document.getElementById("gioDi");
    if(gioDiInput) gioDiInput.value = "08:00";
});

</script>
</body>
</html>
