<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu giá xe tiện chuyến</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f3f4f6;padding:20px}
.container{max-width:650px;margin:auto;background:#fff;border-radius:15px;padding:25px;box-shadow:0 3px 15px rgba(0,0,0,.15)}
h1{text-align:center;color:#0d6efd;margin-bottom:25px}
h2{margin:25px 0 15px;color:#0d6efd}
label{display:block;margin-top:15px;margin-bottom:5px;font-weight:bold}
select,.txt{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:16px}
button{width:100%;margin-top:20px;padding:14px;border:none;border-radius:8px;background:#0d6efd;color:#fff;font-size:18px;cursor:pointer}
#ketqua{margin-top:20px}
.card{background:#eef6ff;border-radius:10px;padding:15px}
.dong{margin:8px 0;font-size:18px}
.gia{color:red;font-size:26px;font-weight:bold}
#thongBao{margin-top:15px;text-align:center;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<h1>🚖 TRA CỨU GIÁ XE TIỆN CHUYẾN</h1>

<label>Điểm đi</label>
<select id="diemDi"></select>

<label>Điểm đến</label>
<select id="diemDen"></select>

<button onclick="traCuu()">Tra cứu giá</button>

<div id="ketqua"></div>

<hr style="margin:30px 0">

<h2>📝 ĐẶT XE</h2>

<input type="text" id="hoTen" class="txt" placeholder="Họ và tên">
<br><br>
<input type="tel" id="sdt" class="txt" placeholder="Số điện thoại">
<br><br>
<input type="date" id="ngayDi" class="txt">

<button onclick="datXe()">🚖 Đặt xe ngay</button>

<div id="thongBao"></div>
</div>

<script>
const csvUrl="https://docs.google.com/spreadsheets/d/1ql2Aruz-GCF8lAInY-b_b72d74vazyhM2-wwSiCCNNQ/gviz/tq?tqx=out:csv";
const scriptUrl="https://script.google.com/macros/s/AKfycby4v6G0suvi5jUrGj7FPovr6XQGx9TOcr6Z0tP29N-2RL7yfvBlFobzi-rCLfQO1tLs8Q/exec";

let duLieu=[];

async function loadData(){
 try{
   const response=await fetch(csvUrl);
   const text=await response.text();
   const rows=text.trim().split("\\n");
   duLieu=[];

   rows.slice(1).forEach(row=>{
      const cols=row.split(",").map(x=>x.replace(/"/g,"").trim());
      if(cols[0]&&cols[1]){
        duLieu.push({
          diemDi:cols[0],
          diemDen:cols[1],
          km:cols[2],
          gia:cols[3]
        });
      }
   });

   taoDanhSachDiaDiem();
 }catch(e){
   document.getElementById("ketqua").innerHTML="Không tải được dữ liệu";
 }
}

function taoDanhSachDiaDiem(){
 const ds=[...new Set(duLieu.flatMap(x=>[x.diemDi,x.diemDen]))].sort();
 const dd=document.getElementById("diemDi");
 const dn=document.getElementById("diemDen");
 dd.innerHTML="";
 dn.innerHTML="";
 ds.forEach(i=>{
   dd.innerHTML+=`<option value="${i}">${i}</option>`;
   dn.innerHTML+=`<option value="${i}">${i}</option>`;
 });
}

function traCuu(){
 const di=document.getElementById("diemDi").value;
 const den=document.getElementById("diemDen").value;

 const t=duLieu.find(x=>
   (x.diemDi===di && x.diemDen===den) ||
   (x.diemDi===den && x.diemDen===di)
 );

 if(!t){
   document.getElementById("ketqua").innerHTML="<h3 style='color:red'>Không tìm thấy tuyến xe</h3>";
   return;
 }

 const gia=Number(String(t.gia).replace(/,/g,""));

 document.getElementById("ketqua").innerHTML=`
 <div class="card">
 <div class="dong">📍 Điểm đi: <b>${di}</b></div>
 <div class="dong">📍 Điểm đến: <b>${den}</b></div>
 <div class="dong">🛣️ Quãng đường: <b>${t.km} km</b></div>
 <div class="dong gia">💰 ${gia.toLocaleString("vi-VN")} đồng</div>
 </div>`;
}

async function datXe(){
 const hoTen=document.getElementById("hoTen").value.trim();
 const sdt=document.getElementById("sdt").value.trim();
 const ngayDi=document.getElementById("ngayDi").value;
 const diemDi=document.getElementById("diemDi").value;
 const diemDen=document.getElementById("diemDen").value;

 if(!hoTen||!sdt||!ngayDi){
   alert("Vui lòng nhập đầy đủ thông tin");
   return;
 }

 try{
   await fetch(scriptUrl,{
     method:"POST",
     body:JSON.stringify({hoTen,sdt,diemDi,diemDen,ngayDi})
   });

   document.getElementById("thongBao").innerHTML="✅ Đặt xe thành công";
   document.getElementById("hoTen").value="";
   document.getElementById("sdt").value="";
   document.getElementById("ngayDi").value="";
 }catch(e){
   document.getElementById("thongBao").innerHTML="❌ Gửi thất bại";
 }
}

loadData();
</script>
</body>
</html>
