<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Đặt xe - Vận tải kết nối</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #f5f7fb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 0; min-height: 100vh; }
    .app-container { max-width: 500px; margin: 0 auto; background: #ffffff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
    .app-header { background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%); padding: 20px; color: white; border-radius: 0 0 24px 24px; }
    .app-header h1 { font-size: 1.6rem; font-weight: 700; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .driver-link { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; border-radius: 30px; font-size: 0.8rem; font-weight: 600; color: white; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .form-group { margin-bottom: 18px; position: relative; }
    .form-label { font-size: 0.75rem; font-weight: 600; color: #5a6874; margin-bottom: 6px; display: block; }
    .input-wrapper { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 1rem; }
    input, select { width: 100%; padding: 14px 16px 14px 42px; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 0.95rem; background: white; }
    input:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0,102,204,0.1); }
    .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #e2e8f0; border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
    .autocomplete-list div { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f0f2f5; }
    .autocomplete-list div:hover { background: #0066cc; color: white; }
    .btn-group { display: flex; gap: 12px; margin: 20px 0; }
    .btn { padding: 12px 16px; border-radius: 14px; font-weight: 600; font-size: 0.9rem; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #0066cc; color: white; }
    .btn-secondary { background: #f1f5f9; color: #1e293b; border: 1px solid #e2e8f0; }
    .service-type { background: #f8fafc; padding: 10px; border-radius: 14px; display: flex; gap: 16px; margin: 14px 0 18px; }
    .service-option { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; border-radius: 12px; background: white; border: 1px solid #e2e8f0; cursor: pointer; }
    .service-option.active { background: #0066cc !important; color: white !important; border-color: #0066cc !important; }
    .service-option input { display: none; }
    .result-card { background: #f8fafc; border-radius: 20px; padding: 18px; margin: 16px 0; border: 1px solid #e8edf2; }
    .price-tc { color: #0066cc; font-weight: 800; font-size: 1.2rem; }
    .price-bx { color: #dc2626; font-weight: 800; font-size: 1.2rem; }
    .toast-message { margin-top: 16px; padding: 12px 16px; border-radius: 14px; text-align: center; font-weight: 500; font-size: 0.8rem; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .toast-success { background: #d1fae5; color: #065f46; }
    .toast-error { background: #fee2e2; color: #991b1b; }
    .toast-loading { background: #fef3c7; color: #92400e; }
    .app-footer { text-align: center; padding: 16px 20px; font-size: 0.65rem; color: #8a99a8; border-top: 1px solid #eef2f6; margin-top: 20px; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .form-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .form-row .form-group { flex: 1; margin-bottom: 0; }
</style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <h1>
            🚖 Vận tải kết nối
            <a href="taixe.html" class="driver-link">👨‍✈️ Tài xế</a>
        </h1>
        <p>Đặt xe trực tuyến • Giá niêm yết • Xác nhận nhanh</p>
    </div>

    <div style="padding: 20px;">
        <div class="form-group">
            <label class="form-label">ĐIỂM ĐI</label>
            <div class="input-wrapper">
                <span class="input-icon">🚩</span>
                <input type="text" id="diemDi" placeholder="Nhập điểm đi..." autocomplete="off">
                <div id="autocompleteDi" class="autocomplete-list"></div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">ĐIỂM ĐẾN</label>
            <div class="input-wrapper">
                <span class="input-icon">🏁</span>
                <input type="text" id="diemDen" placeholder="Nhập điểm đến..." autocomplete="off">
                <div id="autocompleteDen" class="autocomplete-list"></div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="btnTraCuu" style="flex:2">🔍 Tra cứu giá</button>
            <button class="btn btn-secondary" id="btnDoiViTri" style="flex:1">🔄 Đổi</button>
        </div>

        <div id="ketQuaContainer"></div>

        <div class="service-type">
            <label class="service-option active" data-type="tien_chuyen">
                <input type="radio" name="loaiXe" value="tien_chuyen" checked hidden> 🚗 Tiện chuyến
            </label>
            <label class="service-option" data-type="bao_xe">
                <input type="radio" name="loaiXe" value="bao_xe" hidden> 🚙 Bao xe
            </label>
        </div>

        <div class="form-group">
            <label class="form-label">HỌ VÀ TÊN</label>
            <div class="input-wrapper"><span class="input-icon">👤</span><input type="text" id="hoTen" placeholder="Nguyễn Văn A"></div>
        </div>

        <div class="form-group">
            <label class="form-label">SỐ ĐIỆN THOẠI</label>
            <div class="input-wrapper"><span class="input-icon">📞</span><input type="tel" id="sdt" placeholder="0912 345 678"></div>
        </div>

        <!-- ĐÃ XÓA Ô EMAIL -->

        <div class="form-row">
            <div class="form-group"><label class="form-label">NGÀY ĐI</label><input type="date" id="ngayDi"></div>
            <div class="form-group"><label class="form-label">GIỜ ĐI</label><input type="time" id="gioDi"></div>
        </div>

        <button class="btn btn-primary" id="btnDatXe" style="width:100%; padding:14px;">🚀 XÁC NHẬN ĐẶT XE</button>
        <div id="thongBao"></div>
    </div>

    <div class="app-footer">⚡ Dữ liệu trực tiếp từ Google Sheet | Hỗ trợ: 1900 xxxx</div>
</div>

<script>
    // ==================== CẤU HÌNH ====================
    const SPREADSHEET_ID = "1NHlih_wxV-rzZCytWbGh96WSFJOfO1yeiPrPp-2QOkg";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;
    const API_URL = "https://script.google.com/macros/s/AKfycbw186RsTclzHo9bjwLkBmvZz6p2YoQXBfX6GX8hZXXhq6cJ3KCcy-4wqzC62U11M1-x/exec";
    
    let danhSachTuyen = [];
    let danhSachDiaDanh = [];
    
    const diemDiInput = document.getElementById('diemDi');
    const diemDenInput = document.getElementById('diemDen');
    const autoDiDiv = document.getElementById('autocompleteDi');
    const autoDenDiv = document.getElementById('autocompleteDen');
    const ketQuaDiv = document.getElementById('ketQuaContainer');
    const thongBaoDiv = document.getElementById('thongBao');
    
    function normalizePlace(str) {
        if (!str) return "";
        let n = str.toLowerCase().trim();
        n = n.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        return n.replace(/đ/g, "d").replace(/\s+/g, " ");
    }
    
    function isSameLocation(a, b) { return normalizePlace(a) === normalizePlace(b); }
    
    async function loadDataFromSheet() {
        try {
            const response = await fetch(`${CSV_URL}&_t=${Date.now()}`, { cache: 'no-store' });
            const csvText = await response.text();
            const rows = parseCSV(csvText);
            if (rows.length < 2) return;
            
            const headers = rows[0].map(h => h.trim());
            const idxDi = headers.findIndex(h => h === "Điểm đi");
            const idxDen = headers.findIndex(h => h === "Điểm đến");
            const idxKm = headers.findIndex(h => h === "số km");
            const idxGiaTc = headers.findIndex(h => h === "Giá tiện chuyến");
            const idxGiaBx = headers.findIndex(h => h === "Giá bao xe");
            
            danhSachTuyen = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const diemDi = row[idxDi]?.trim();
                const diemDen = row[idxDen]?.trim();
                if (!diemDi || !diemDen) continue;
                danhSachTuyen.push({
                    diemDi, diemDen,
                    km: parseFloat(row[idxKm]?.replace(/[^0-9.-]/g, '')) || 0,
                    giaTienChuyen: parseFloat(row[idxGiaTc]?.replace(/[^0-9.-]/g, '')) || 0,
                    giaBaoXe: parseFloat(row[idxGiaBx]?.replace(/[^0-9.-]/g, '')) || 0,
                });
            }
            
            const diaDanhSet = new Set();
            danhSachTuyen.forEach(t => { diaDanhSet.add(t.diemDi); diaDanhSet.add(t.diemDen); });
            danhSachDiaDanh = Array.from(diaDanhSet);
            setupAutocomplete(diemDiInput, autoDiDiv);
            setupAutocomplete(diemDenInput, autoDenDiv);
        } catch(e) { console.error(e); }
    }
    
    function parseCSV(csvString) {
        const rows = [], lines = csvString.split(/\r?\n/);
        for (let line of lines) {
            if (!line.trim()) continue;
            const row = [];
            let inQuote = false, cur = '';
            for (let i = 0; i < line.length; i++) {
                const c = line[i];
                if (c === '"') inQuote = !inQuote;
                else if (c === ',' && !inQuote) { row.push(cur.trim()); cur = ''; }
                else cur += c;
            }
            row.push(cur.trim());
            rows.push(row);
        }
        return rows;
    }
    
    function setupAutocomplete(input, list) {
        input.addEventListener('input', (e) => {
            const kw = e.target.value.toLowerCase();
            list.innerHTML = '';
            const filtered = kw ? danhSachDiaDanh.filter(p => p.toLowerCase().includes(kw)).slice(0, 15) : danhSachDiaDanh.slice(0, 15);
            filtered.forEach(p => {
                const div = document.createElement('div');
                div.textContent = p;
                div.onclick = () => { input.value = p; list.style.display = 'none'; traCuuGia(); };
                list.appendChild(div);
            });
            list.style.display = filtered.length ? 'block' : 'none';
        });
        input.addEventListener('focus', () => input.dispatchEvent(new Event('input')));
        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !list.contains(e.target)) list.style.display = 'none';
        });
    }
    
    function traCuuGia() {
        const di = diemDiInput.value.trim(), den = diemDenInput.value.trim();
        if (!di || !den) { ketQuaDiv.innerHTML = '<div class="toast-message toast-error">❗ Nhập điểm đi và đến</div>'; return; }
        const tuyen = danhSachTuyen.find(t => (isSameLocation(t.diemDi, di) && isSameLocation(t.diemDen, den)) || (isSameLocation(t.diemDi, den) && isSameLocation(t.diemDen, di)));
        if (!tuyen) { ketQuaDiv.innerHTML = `<div class="toast-message toast-error">🚫 Không tìm thấy tuyến: ${di} → ${den}</div>`; return; }
        ketQuaDiv.innerHTML = `<div class="result-card"><div class="flex-between"><strong>🚩 Đi:</strong> ${tuyen.diemDi} → <strong>🏁 Đến:</strong> ${tuyen.diemDen}</div><div>🛣️ ${tuyen.km} km</div><div class="flex-between"><span>🚗 Tiện chuyến</span><span class="price-tc">${tuyen.giaTienChuyen.toLocaleString('vi-VN')}đ</span></div><div class="flex-between"><span>🚙 Bao xe</span><span class="price-bx">${tuyen.giaBaoXe.toLocaleString('vi-VN')}đ</span></div></div>`;
        window.lastRoute = tuyen;
    }
    
    function doiViTri() { const t = diemDiInput.value; diemDiInput.value = diemDenInput.value; diemDenInput.value = t; traCuuGia(); }
    
    function datXe() {
        const hoTen = document.getElementById('hoTen').value.trim();
        const sdt = document.getElementById('sdt').value.trim();
        const ngayDi = document.getElementById('ngayDi').value;
        const gioDi = document.getElementById('gioDi').value;
        const diemDi = diemDiInput.value.trim();
        const diemDen = diemDenInput.value.trim();
        const loaiXe = document.querySelector('input[name="loaiXe"]:checked').value;
        
        if (!hoTen || !sdt || !ngayDi || !gioDi) { 
            alert("Vui lòng nhập đầy đủ: Họ tên, Số điện thoại, Ngày đi, Giờ đi"); 
            return; 
        }
        if (!window.lastRoute) { 
            alert("Vui lòng tra cứu giá trước khi đặt"); 
            return; 
        }
        
        const loaiXeText = loaiXe === "tien_chuyen" ? "Tiện chuyến" : "Bao xe";
        const giaTri = loaiXe === "tien_chuyen" ? window.lastRoute.giaTienChuyen : window.lastRoute.giaBaoXe;
        
        if (!confirm(`XÁC NHẬN ĐẶT ${loaiXeText}\n👤 ${hoTen}\n📞 ${sdt}\n🚏 ${diemDi} → ${diemDen}\n📅 ${ngayDi} ${gioDi}\n💰 ${giaTri.toLocaleString('vi-VN')}đ`)) return;
        
        thongBaoDiv.innerHTML = '<div class="toast-message toast-loading">⏳ Đang xử lý...</div>';
        
        // email để trống
        const url = `${API_URL}?action=createBooking&hoTen=${encodeURIComponent(hoTen)}&sdt=${encodeURIComponent(sdt)}&email=&diemDi=${encodeURIComponent(diemDi)}&diemDen=${encodeURIComponent(diemDen)}&ngayDi=${encodeURIComponent(ngayDi)}&gioDi=${encodeURIComponent(gioDi)}&loaiXe=${encodeURIComponent(loaiXeText)}&giaTri=${giaTri}`;
        
        fetch(url, { method: 'GET', mode: 'no-cors' }).catch(e => console.log(e));
        new Image().src = url;
        
        thongBaoDiv.innerHTML = '<div class="toast-message toast-success">✅ Đặt xe thành công!</div>';
        document.getElementById('hoTen').value = '';
        document.getElementById('sdt').value = '';
        setTimeout(() => thongBaoDiv.innerHTML = '', 3000);
    }
    
    function setDefaultDateTime() {
        document.getElementById('ngayDi').value = new Date().toISOString().split('T')[0];
        document.getElementById('gioDi').value = '08:00';
    }
    
    document.querySelectorAll('.service-option').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.service-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            opt.querySelector('input').checked = true;
        });
    });
    
    document.getElementById('btnTraCuu').addEventListener('click', traCuuGia);
    document.getElementById('btnDoiViTri').addEventListener('click', doiViTri);
    document.getElementById('btnDatXe').addEventListener('click', datXe);
    
    loadDataFromSheet();
    setDefaultDateTime();
</script>
</body>
</html>
