<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tra cứu giá xe tiện chuyến</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#0d6efd;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    background:#0d6efd;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

#ketqua{
    margin-top:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:red;
}
</style>
</head>

<body>

<div class="container">

<h1>🚖 Tra cứu giá xe tiện chuyến</h1>

<label>Điểm đi</label>
<select id="diemDi"></select>

<label>Điểm đến</label>
<select id="diemDen"></select>

<button onclick="traCuu()">Tra cứu giá</button>

<div id="ketqua"></div>

</div>

<script>

const bangGia = [
    {
        diemDi:"Bắc Kạn",
        diemDen:"Thái Nguyên",
        gia:200000
    },
    {
        diemDi:"Thái Nguyên",
        diemDen:"Hải Phòng",
        gia:600000
    },
    {
        diemDi:"Thái Nguyên",
        diemDen:"Chợ Mới",
        gia:130000
    }
];

const danhSachDiaDiem = [...new Set(
    bangGia.flatMap(x => [x.diemDi, x.diemDen])
)];

const diemDi = document.getElementById("diemDi");
const diemDen = document.getElementById("diemDen");

danhSachDiaDiem.forEach(diem=>{
    diemDi.innerHTML += `<option>${diem}</option>`;
    diemDen.innerHTML += `<option>${diem}</option>`;
});

function dinhDangTien(so){
    return so.toLocaleString("vi-VN")+" đ";
}

function traCuu(){

    const di = diemDi.value;
    const den = diemDen.value;

    const tuyen = bangGia.find(x =>
        x.diemDi === di &&
        x.diemDen === den
    );

    if(tuyen){
        document.getElementById("ketqua").innerHTML =
            "Giá cước: " + dinhDangTien(tuyen.gia);
    }
    else{
        document.getElementById("ketqua").innerHTML =
            "Không có dữ liệu giá tuyến này";
    }
}

</script>

</body>
</html>
