<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Vận tải kết nối - Đặt xe trực tuyến</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background: #f5f7fb;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 0;
        min-height: 100vh;
    }

    /* Container chính */
    .app-container {
        max-width: 500px;
        margin: 0 auto;
        background: #ffffff;
        min-height: 100vh;
        box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }

    /* Header chuyên nghiệp */
    .app-header {
        background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
        padding: 20px 20px 24px;
        color: white;
        position: relative;
        border-radius: 0 0 24px 24px;
    }

    .app-header h1 {
        font-size: 1.6rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
        letter-spacing: -0.3px;
    }

    .app-header p {
        font-size: 0.8rem;
        opacity: 0.85;
        margin-top: 4px;
    }

    .header-badge {
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(10px);
        padding: 4px 12px;
        border-radius: 30px;
        font-size: 0.7rem;
        font-weight: 500;
    }

    /* Nội dung chính */
    .app-content {
        padding: 20px;
        margin-top: -8px;
    }

    /* Card thông tin */
    .info-card {
        background: #f0f7ff;
        border-radius: 16px;
        padding: 12px 16px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        border: 1px solid #dce7f5;
    }

    .info-stats {
        display: flex;
        gap: 12px;
        font-size: 0.7rem;
    }

    .stat {
        background: white;
        padding: 4px 10px;
        border-radius: 20px;
        color: #0066cc;
        font-weight: 600;
    }

    .refresh-btn {
        background: white;
        border: none;
        padding: 6px 14px;
        border-radius: 30px;
        font-size: 0.7rem;
        font-weight: 600;
        color: #0066cc;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.2s;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .refresh-btn:active {
        transform: scale(0.96);
        background: #e8f0fe;
    }

    /* Form group */
    .form-group {
        margin-bottom: 18px;
    }

    .form-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: #5a6874;
        margin-bottom: 6px;
        display: block;
        letter-spacing: 0.3px;
    }

    .input-wrapper {
        position: relative;
    }

    .input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1rem;
        pointer-events: none;
    }

    input {
        width: 100%;
        padding: 14px 16px 14px 42px;
        border: 1.5px solid #e2e8f0;
        border-radius: 14px;
        font-size: 0.95rem;
        transition: all 0.2s;
        background: white;
        font-family: inherit;
    }

    input:focus {
        outline: none;
        border-color: #0066cc;
        box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
    }

    /* Autocomplete */
    .autocomplete-list {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        max-height: 200px;
        overflow-y: auto;
        z-index: 100;
        display: none;
        box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .autocomplete-list div {
        padding: 12px 16px;
        cursor: pointer;
        font-size: 0.9rem;
        border-bottom: 1px solid #f0f2f5;
        transition: background 0.15s;
    }

    .autocomplete-list div:active {
        background: #0066cc;
        color: white;
    }

    /* Button group */
    .btn-group {
        display: flex;
        gap: 12px;
        margin: 20px 0 18px;
    }

    .btn {
        flex: 1;
        padding: 12px 16px;
        border-radius: 14px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-primary {
        background: #0066cc;
        color: white;
        box-shadow: 0 2px 8px rgba(0,102,204,0.25);
    }

    .btn-primary:active {
        transform: scale(0.97);
        background: #0052a3;
    }

    .btn-secondary {
        background: white;
        color: #0066cc;
        border: 1.5px solid #0066cc;
    }

    .btn-secondary:active {
        transform: scale(0.97);
        background: #f0f7ff;
    }

    /* Result card */
    .result-card {
        background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
        border-radius: 20px;
        padding: 18px;
        margin: 16px 0;
        border: 1px solid #e8edf2;
        box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }

    .route-info {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        padding-bottom: 12px;
        border-bottom: 2px dashed #e2e8f0;
    }

    .route-point {
        flex: 1;
    }

    .route-point-label {
        font-size: 0.65rem;
        color: #8a99a8;
        margin-bottom: 4px;
    }

    .route-point-name {
        font-weight: 700;
        font-size: 0.9rem;
        color: #1e2a3a;
        word-break: break-word;
    }

    .route-arrow {
        color: #0066cc;
        font-size: 1.2rem;
        padding: 0 12px;
    }

    .km-info {
        font-size: 0.75rem;
        color: #6b7a8a;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .price-item {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 10px 0;
        border-top: 1px solid #eef2f6;
    }

    .price-item:first-of-type {
        border-top: none;
    }

    .price-label {
        font-weight: 600;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .price-value {
        font-size: 1.3rem;
        font-weight: 800;
    }

    .price-tc { color: #0066cc; }
    .price-bx { color: #dc2626; }

    /* Radio group */
    .service-type {
        background: #f8fafc;
        padding: 10px;
        border-radius: 14px;
        display: flex;
        gap: 16px;
        margin: 14px 0 18px;
        border: 1px solid #e2e8f0;
    }

    .service-option {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        background: white;
        border: 1px solid #e2e8f0;
    }

    .service-option.active {
        background: #0066cc;
        color: white;
        border-color: #0066cc;
    }

    .service-option input {
        display: none;
    }

    /* Booking form */
    .booking-section {
        margin-top: 20px;
    }

    .section-title {
        font-size: 1rem;
        font-weight: 700;
        color: #1e2a3a;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .form-row {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
    }

    .form-row .form-group {
        flex: 1;
        margin-bottom: 0;
    }

    .btn-submit {
        width: 100%;
        background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
        color: white;
        padding: 14px;
        border-radius: 14px;
        font-weight: 700;
        font-size: 1rem;
        margin-top: 20px;
        box-shadow: 0 4px 12px rgba(0,102,204,0.3);
    }

    .btn-submit:active {
        transform: scale(0.98);
    }

    /* Toast message */
    .toast-message {
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: 14px;
        text-align: center;
        font-weight: 500;
        font-size: 0.8rem;
        animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .toast-success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
    .toast-error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
    .toast-loading { background: #fef3c7; color: #92400e; border-left: 4px solid #f59e0b; }

    /* Collapsible điểm */
    .points-collapsible {
        background: #f8fafc;
        border-radius: 14px;
        margin-bottom: 16px;
        overflow: hidden;
    }

    .points-header {
        padding: 12px 16px;
        font-size: 0.75rem;
        color: #5a6874;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
    }

    .points-header:active {
        background: #f1f5f9;
    }

    .points-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
    }

    .points-list.open {
        max-height: 150px;
        overflow-y: auto;
    }

    .point-chip {
        background: white;
        padding: 6px 14px;
        border-radius: 30px;
        font-size: 0.7rem;
        color: #1e2a3a;
        cursor: pointer;
        border: 1px solid #cbd5e1;
        transition: all 0.15s;
    }

    .point-chip:active {
        background: #0066cc;
        color: white;
        border-color: #0066cc;
    }

    /* Footer */
    .app-footer {
        text-align: center;
        padding: 16px 20px;
        font-size: 0.65rem;
        color: #8a99a8;
        border-top: 1px solid #eef2f6;
        margin-top: 20px;
    }

    /* Utility */
    .text-center { text-align: center; }
    .mt-2 { margin-top: 8px; }
    .mb-2 { margin-bottom: 8px; }
</style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <h1>
            🚖 Vận tải kết nối
            <span class="header-badge">Tiện chuyến · Bao xe</span>
        </h1>
        <p>Đặt xe trực tuyến • Giá niêm yết • Xác nhận nhanh</p>
    </div>

    <div class="app-content">
        <!-- Info bar -->
        <div class="info-card">
            <div class="info-stats">
                <span class="stat" id="statTuyen">📊 Đang tải</span>
            </div>
            <button class="refresh-btn" id="btnReload">
                🔄 Tải lại
            </button>
        </div>

        <!-- Danh sách điểm (collapsible) -->
        <div class="points-collapsible">
            <div class="points-header" id="pointsHeader">
                <span>📍 Danh sách điểm có sẵn</span>
                <span>▼</span>
            </div>
            <div class="points-list" id="pointsList">
                <div class="text-center" style="width:100%; padding:12px;">Đang tải...</div>
            </div>
        </div>

        <!-- Form tra cứu -->
        <div class="form-group">
            <label class="form-label">ĐIỂM ĐI</label>
            <div class="input-wrapper">
                <span class="input-icon">🚩</span>
                <input type="text" id="diemDi" placeholder="Nhập điểm đi..." autocomplete="off">
                <div id="autocompleteDi" class="autocomplete-list"></div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">ĐIỂM ĐẾN</label>
            <div class="input-wrapper">
                <span class="input-icon">🏁</span>
                <input type="text" id="diemDen" placeholder="Nhập điểm đến..." autocomplete="off">
                <div id="autocompleteDen" class="autocomplete-list"></div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="btnTraCuu">🔍 Tra cứu giá</button>
            <button class="btn btn-secondary" id="btnDoiViTri">🔄 Đổi chiều</button>
        </div>

        <div id="ketQuaContainer"></div>

        <!-- Phần đặt xe -->
        <div class="booking-section">
            <div class="section-title">
                <span>✍️</span> ĐẶT XE NGAY
            </div>

            <div class="service-type" id="serviceType">
                <label class="service-option active" data-type="tien_chuyen">
                    <input type="radio" name="loaiXe" value="tien_chuyen" checked hidden>
                    🚗 Tiện chuyến
                </label>
                <label class="service-option" data-type="bao_xe">
                    <input type="radio" name="loaiXe" value="bao_xe" hidden>
                    🚙 Bao xe
                </label>
            </div>

            <div class="form-group">
                <label class="form-label">HỌ VÀ TÊN</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="hoTen" placeholder="Nguyễn Văn A">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">SỐ ĐIỆN THOẠI</label>
                <div class="input-wrapper">
                    <span class="input-icon">📞</span>
                    <input type="tel" id="sdt" placeholder="0912 345 678">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">EMAIL (Tùy chọn)</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="email" placeholder="example@gmail.com">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">NGÀY ĐI</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📅</span>
                        <input type="date" id="ngayDi">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">GIỜ ĐI</label>
                    <div class="input-wrapper">
                        <span class="input-icon">⏰</span>
                        <input type="time" id="gioDi">
                    </div>
                </div>
            </div>

            <button class="btn btn-primary btn-submit" id="btnDatXe">
                🚀 XÁC NHẬN ĐẶT XE
            </button>

            <div id="thongBao"></div>
        </div>

        <div class="app-footer">
            ⚡ Dữ liệu trực tiếp từ Google Sheet | Nhấn "Tải lại" nếu vừa cập nhật điểm mới<br>
            📞 CSKH sẽ liên hệ xác nhận trong ít phút
        </div>
    </div>
</div>

<script>
    // Cấu hình
    const SPREADSHEET_ID = "1NHlih_wxV-rzZCytWbGh96WSFJOfO1yeiPrPp-2QOkg";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzkIQhjOZ2Tg7K9Pml9XnsUlMvcIfjCdUAJwN3fRZPqlIya34wHqc3UeXFowJbTgBbqGg/exec";
    
    let danhSachTuyen = [];
    let danhSachDiaDanh = [];
    let isLoading = false;
    
    // DOM
    const diemDiInput = document.getElementById('diemDi');
    const diemDenInput = document.getElementById('diemDen');
    const autoDiDiv = document.getElementById('autocompleteDi');
    const autoDenDiv = document.getElementById('autocompleteDen');
    const ketQuaDiv = document.getElementById('ketQuaContainer');
    const thongBaoDiv = document.getElementById('thongBao');
    const statTuyen = document.getElementById('statTuyen');
    const pointsListDiv = document.getElementById('pointsList');
    const pointsHeader = document.getElementById('pointsHeader');
    
    let pointsOpen = false;
    
    pointsHeader.addEventListener('click', () => {
        pointsOpen = !pointsOpen;
        const pointsList = document.querySelector('.points-list');
        const arrow = pointsHeader.querySelector('span:last-child');
        if (pointsOpen) {
            pointsList.classList.add('open');
            arrow.textContent = '▲';
        } else {
            pointsList.classList.remove('open');
            arrow.textContent = '▼';
        }
    });
    
    // Service type toggle
    const serviceOptions = document.querySelectorAll('.service-option');
    serviceOptions.forEach(opt => {
        opt.addEventListener('click', () => {
            serviceOptions.forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            const radio = opt.querySelector('input');
            if (radio) radio.checked = true;
        });
    });
    
    function normalizePlace(str) {
        if (!str) return "";
        let normalized = str.toLowerCase().trim();
        normalized = normalized.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        normalized = normalized.replace(/đ/g, "d").replace(/Đ/g, "d");
        normalized = normalized.replace(/\s+/g, " ");
        return normalized;
    }
    
    function isSameLocation(loc1, loc2) {
        if (!loc1 || !loc2) return false;
        return normalizePlace(loc1) === normalizePlace(loc2);
    }
    
    async function loadDataFromSheet(showMessage = true) {
        if (isLoading) return;
        isLoading = true;
        
        statTuyen.innerHTML = '⏳ Đang tải...';
        
        try {
            const url = `${CSV_URL}&_t=${Date.now()}`;
            const response = await fetch(url, { cache: 'no-store' });
            if (!response.ok) throw new Error("Không thể tải dữ liệu");
            const csvText = await response.text();
            
            const rows = parseCSV(csvText);
            if (rows.length < 2) throw new Error("CSV không có dữ liệu");
            
            const headers = rows[0].map(h => h.trim().toLowerCase());
            const idxDi = headers.findIndex(h => h === "điểm đi" || h === "diem di");
            const idxDen = headers.findIndex(h => h === "điểm đến" || h === "diem den");
            const idxKm = headers.findIndex(h => h === "số km" || h === "so km" || h === "km");
            const idxGiaTc = headers.findIndex(h => h === "giá tiện chuyến" || h === "gia tien chuyen");
            const idxGiaBx = headers.findIndex(h => h === "giá bao xe" || h === "gia bao xe");
            
            if ([idxDi, idxDen, idxKm, idxGiaTc, idxGiaBx].some(i => i === -1)) {
                throw new Error("Cấu trúc cột không đúng");
            }
            
            const newTuyen = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length < 5) continue;
                const diemDi = row[idxDi]?.trim();
                const diemDen = row[idxDen]?.trim();
                if (!diemDi || !diemDen) continue;
                
                let kmRaw = (row[idxKm] || "").replace(/[^0-9.-]/g, '');
                let giaTcRaw = (row[idxGiaTc] || "").replace(/[^0-9.-]/g, '');
                let giaBxRaw = (row[idxGiaBx] || "").replace(/[^0-9.-]/g, '');
                
                newTuyen.push({
                    diemDi: diemDi,
                    diemDen: diemDen,
                    km: parseFloat(kmRaw) || 0,
                    giaTienChuyen: parseFloat(giaTcRaw) || 0,
                    giaBaoXe: parseFloat(giaBxRaw) || 0,
                });
            }
            
            if (newTuyen.length === 0) throw new Error("Không có tuyến xe");
            
            danhSachTuyen = newTuyen;
            
            const diaDanhSet = new Set();
            danhSachTuyen.forEach(t => { diaDanhSet.add(t.diemDi); diaDanhSet.add(t.diemDen); });
            danhSachDiaDanh = Array.from(diaDanhSet).sort((a,b) => a.localeCompare(b, 'vi'));
            
            statTuyen.innerHTML = `📊 ${danhSachTuyen.length} tuyến · ${danhSachDiaDanh.length} điểm`;
            
            // Hiển thị danh sách điểm
            pointsListDiv.innerHTML = danhSachDiaDanh.map(point => 
                `<span class="point-chip" data-point="${point.replace(/"/g, '&quot;')}">${point}</span>`
            ).join('');
            
            document.querySelectorAll('.point-chip').forEach(chip => {
                chip.addEventListener('click', (e) => {
                    const point = chip.getAttribute('data-point');
                    if (document.activeElement === diemDiInput || diemDiInput.value === "") {
                        diemDiInput.value = point;
                        if (diemDenInput.value) traCuuGia();
                    } else {
                        diemDenInput.value = point;
                        if (diemDiInput.value) traCuuGia();
                    }
                });
            });
            
            setupAutocomplete(diemDiInput, autoDiDiv);
            setupAutocomplete(diemDenInput, autoDenDiv);
            
            if (showMessage) {
                ketQuaDiv.innerHTML = `<div class="toast-message toast-success">✅ Đã cập nhật ${danhSachTuyen.length} tuyến</div>`;
                setTimeout(() => { if (ketQuaDiv.innerHTML.includes('cập nhật')) ketQuaDiv.innerHTML = ''; }, 2000);
            }
            
        } catch (error) {
            console.error(error);
            statTuyen.innerHTML = '⚠️ Lỗi tải';
            if (showMessage) {
                ketQuaDiv.innerHTML = `<div class="toast-message toast-error">❌ ${error.message}</div>`;
            }
        } finally {
            isLoading = false;
        }
    }
    
    function parseCSV(csvString) {
        const rows = [];
        const lines = csvString.split(/\r?\n/);
        for (let line of lines) {
            if (line.trim() === "") continue;
            const row = [];
            let inQuote = false;
            let current = '';
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuote = !inQuote;
                else if (char === ',' && !inQuote) { row.push(current.trim()); current = ''; }
                else current += char;
            }
            row.push(current.trim());
            rows.push(row);
        }
        return rows;
    }
    
    function setupAutocomplete(inputElement, listElement) {
        const showSuggestions = (keyword) => {
            listElement.innerHTML = '';
            if (!danhSachDiaDanh.length) return;
            
            const searchNorm = normalizePlace(keyword);
            let filtered = keyword === "" ? danhSachDiaDanh.slice(0, 15) : 
                danhSachDiaDanh.filter(p => normalizePlace(p).includes(searchNorm) || p.toLowerCase().includes(keyword.toLowerCase())).slice(0, 15);
            
            if (filtered.length === 0) {
                const div = document.createElement('div');
                div.textContent = '📭 Không tìm thấy điểm nào';
                div.style.color = '#94a3b8';
                div.style.cursor = 'default';
                listElement.appendChild(div);
            } else {
                filtered.forEach(place => {
                    const div = document.createElement('div');
                    div.textContent = place;
                    div.addEventListener('click', () => { 
                        inputElement.value = place; 
                        listElement.style.display = 'none'; 
                        traCuuGia(); 
                    });
                    listElement.appendChild(div);
                });
            }
            listElement.style.display = filtered.length > 0 ? 'block' : 'none';
        };
        
        inputElement.addEventListener('input', (e) => showSuggestions(e.target.value));
        inputElement.addEventListener('focus', () => { if (danhSachDiaDanh.length) showSuggestions(inputElement.value); });
        document.addEventListener('click', (e) => {
            if (!inputElement.contains(e.target) && !listElement.contains(e.target)) {
                listElement.style.display = 'none';
            }
        });
    }
    
    function traCuuGia() {
        let di = diemDiInput.value.trim();
        let den = diemDenInput.value.trim();
        
        if (!di || !den) {
            ketQuaDiv.innerHTML = '<div class="toast-message toast-error">❗ Nhập đủ điểm đi và đến</div>';
            return;
        }
        
        if (isSameLocation(di, den)) {
            ketQuaDiv.innerHTML = '<div class="toast-message toast-error">📍 Điểm đi và đến không thể trùng</div>';
            return;
        }
        
        const tuyen = danhSachTuyen.find(t => 
            (isSameLocation(t.diemDi, di) && isSameLocation(t.diemDen, den)) ||
            (isSameLocation(t.diemDi, den) && isSameLocation(t.diemDen, di))
        );
        
        if (!tuyen) {
            ketQuaDiv.innerHTML = `
                <div class="toast-message toast-error">
                    🚫 Không tìm thấy tuyến: ${di} → ${den}<br>
                    💡 Nhấn "Tải lại" nếu vừa thêm điểm mới
                </div>
            `;
            window.lastQueriedRoute = null;
            return;
        }
        
        const formatVND = (num) => num.toLocaleString('vi-VN') + 'đ';
        ketQuaDiv.innerHTML = `
            <div class="result-card">
                <div class="route-info">
                    <div class="route-point">
                        <div class="route-point-label">ĐIỂM ĐI</div>
                        <div class="route-point-name">${tuyen.diemDi}</div>
                    </div>
                    <div class="route-arrow">→</div>
                    <div class="route-point">
                        <div class="route-point-label">ĐIỂM ĐẾN</div>
                        <div class="route-point-name">${tuyen.diemDen}</div>
                    </div>
                </div>
                <div class="km-info">
                    <span>🛣️</span> Quãng đường: ${tuyen.km} km
                </div>
                <div class="price-item">
                    <div class="price-label">🚗 Tiện chuyến</div>
                    <div class="price-value price-tc">${formatVND(tuyen.giaTienChuyen)}</div>
                </div>
                <div class="price-item">
                    <div class="price-label">🚙 Bao xe</div>
                    <div class="price-value price-bx">${formatVND(tuyen.giaBaoXe)}</div>
                </div>
            </div>
        `;
        window.lastQueriedRoute = tuyen;
    }
    
    function doiViTri() {
        const temp = diemDiInput.value;
        diemDiInput.value = diemDenInput.value;
        diemDenInput.value = temp;
        traCuuGia();
    }
    
    async function datXe() {
        const hoTen = document.getElementById('hoTen').value.trim();
        const sdt = document.getElementById('sdt').value.trim();
        const email = document.getElementById('email').value.trim();
        const ngayDi = document.getElementById('ngayDi').value;
        const gioDi = document.getElementById('gioDi').value;
        const diemDi = diemDiInput.value.trim();
        const diemDen = diemDenInput.value.trim();
        const loaiXe = document.querySelector('input[name="loaiXe"]:checked').value;
        
        if (!hoTen || !sdt || !ngayDi || !gioDi) {
            thongBaoDiv.innerHTML = '<div class="toast-message toast-error">❗ Vui lòng nhập đầy đủ thông tin</div>';
            setTimeout(() => thongBaoDiv.innerHTML = '', 3000);
            return;
        }
        
        if (!diemDi || !diemDen) {
            thongBaoDiv.innerHTML = '<div class="toast-message toast-error">❗ Vui lòng nhập điểm đi và đến</div>';
            setTimeout(() => thongBaoDiv.innerHTML = '', 3000);
            return;
        }
        
        let tuyen = window.lastQueriedRoute;
        if (!tuyen) {
            tuyen = danhSachTuyen.find(t => 
                (isSameLocation(t.diemDi, diemDi) && isSameLocation(t.diemDen, diemDen)) ||
                (isSameLocation(t.diemDi, diemDen) && isSameLocation(t.diemDen, diemDi))
            );
        }
        
        if (!tuyen) {
            thongBaoDiv.innerHTML = '<div class="toast-message toast-error">❗ Vui lòng tra cứu giá trước khi đặt</div>';
            setTimeout(() => thongBaoDiv.innerHTML = '', 3000);
            return;
        }
        
        const loaiXeText = loaiXe === "tien_chuyen" ? "Tiện chuyến" : "Bao xe";
        const giaTri = loaiXe === "tien_chuyen" ? tuyen.giaTienChuyen : tuyen.giaBaoXe;
        
        if (!confirm(`XÁC NHẬN ĐẶT ${loaiXeText}\n👤 ${hoTen}\n📞 ${sdt}\n🚏 ${diemDi} → ${diemDen}\n📅 ${ngayDi} ${gioDi}\n💰 ${giaTri.toLocaleString('vi-VN')}đ`)) return;
        
        thongBaoDiv.innerHTML = '<div class="toast-message toast-loading">⏳ Đang gửi đơn hàng...</div>';
        
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'createBooking', hoTen, sdt, email, diemDi, diemDen, ngayDi, gioDi, loaiXe: loaiXeText, giaTri, timestamp: new Date().toISOString() })
            });
            thongBaoDiv.innerHTML = '<div class="toast-message toast-success">✅ Đặt xe thành công! CSKH sẽ liên hệ xác nhận.</div>';
            document.getElementById('hoTen').value = '';
            document.getElementById('sdt').value = '';
            document.getElementById('email').value = '';
            setTimeout(() => thongBaoDiv.innerHTML = '', 5000);
        } catch(err) {
            thongBaoDiv.innerHTML = '<div class="toast-message toast-error">❌ Lỗi kết nối, vui lòng thử lại</div>';
            setTimeout(() => thongBaoDiv.innerHTML = '', 4000);
        }
    }
    
    function setDefaultDateTime() {
        const today = new Date();
        document.getElementById('ngayDi').value = today.toISOString().split('T')[0];
        document.getElementById('gioDi').value = '08:00';
    }
    
    document.getElementById('btnTraCuu').addEventListener('click', traCuuGia);
    document.getElementById('btnDoiViTri').addEventListener('click', doiViTri);
    document.getElementById('btnDatXe').addEventListener('click', datXe);
    document.getElementById('btnReload').addEventListener('click', () => loadDataFromSheet(true));
    
    loadDataFromSheet(true).then(setDefaultDateTime);
</script>
</body>
