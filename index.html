<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu giá xe tiện chuyến</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 3px 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#0d6efd;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

#ketqua{
    margin-top:25px;
}

.card{
    background:#eef6ff;
    border-radius:10px;
    padding:15px;
}

.dong{
    margin:8px 0;
    font-size:18px;
}

.gia{
    color:red;
    font-size:26px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🚖 TRA CỨU GIÁ XE TIỆN CHUYẾN</h1>

<label>Điểm đi</label>
<select id="diemDi"></select>

<label>Điểm đến</label>
<select id="diemDen"></select>

<button onclick="traCuu()">Tra cứu giá</button>

<div id="ketqua"></div>

</div>

<script>

// LINK GOOGLE SHEET CỦA BẠN
const csvUrl =
"https://docs.google.com/spreadsheets/d/1ql2Aruz-GCF8lAInY-b_b72d74vazyhM2-wwSiCCNNQ/gviz/tq?tqx=out:csv";

let duLieu = [];

async function loadData(){

    try{

        const response = await fetch(csvUrl);
        const text = await response.text();

        const rows = text.trim().split("\n");

        duLieu = [];

        rows.slice(1).forEach(row=>{

            const cols = row
                .split(",")
                .map(x=>x.replace(/"/g,"").trim());

            if(cols[0] && cols[1]){

                duLieu.push({
                    diemDi: cols[0],
                    diemDen: cols[1],
                    km: cols[2],
                    gia: cols[3]
                });

            }

        });

        taoDanhSachDiaDiem();

    }catch(err){

        document.getElementById("ketqua").innerHTML =
        "<p style='color:red'>Không tải được dữ liệu.</p>";

        console.error(err);
    }
}

function taoDanhSachDiaDiem(){

    const ds = [...new Set(
        duLieu.flatMap(x => [
            x.diemDi,
            x.diemDen
        ])
    )];

    ds.sort();

    const diemDi =
        document.getElementById("diemDi");

    const diemDen =
        document.getElementById("diemDen");

    diemDi.innerHTML = "";
    diemDen.innerHTML = "";

    ds.forEach(item=>{

        diemDi.innerHTML +=
        `<option value="${item}">${item}</option>`;

        diemDen.innerHTML +=
        `<option value="${item}">${item}</option>`;

    });
}

function traCuu(){

    const di =
        document.getElementById("diemDi").value;

    const den =
        document.getElementById("diemDen").value;

    const tuyen = duLieu.find(x =>

        (x.diemDi === di &&
         x.diemDen === den)

         ||

        (x.diemDi === den &&
         x.diemDen === di)

    );

    const ketqua =
        document.getElementById("ketqua");

    if(!tuyen){

        ketqua.innerHTML = `
            <h3 style="color:red;text-align:center">
            Không tìm thấy tuyến xe
            </h3>
        `;

        return;
    }

    const giaSo = Number(
        String(tuyen.gia)
        .replace(/,/g,"")
    );

    ketqua.innerHTML = `

    <div class="card">

        <div class="dong">
        📍 Điểm đi:
        <b>${di}</b>
        </div>

        <div class="dong">
        📍 Điểm đến:
        <b>${den}</b>
        </div>

        <div class="dong">
        🛣️ Số km:
        <b>${tuyen.km} km</b>
        </div>

        <div class="dong gia">
        💰 ${giaSo.toLocaleString("vi-VN")} đồng
        </div>

    </div>

    `;
}

loadData();

</script>

</body>
</html>
