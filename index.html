<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Đặt xe - Tiện chuyến & Bao xe</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    body { background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%); padding: 20px; min-height: 100vh; }
    .container { max-width: 750px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); overflow: hidden; }
    .header { background: #0d6efd; padding: 20px 24px; color: white; }
    .header h1 { font-size: 1.6rem; display: flex; align-items: center; gap: 10px; justify-content: space-between; flex-wrap: wrap; }
    .badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 40px; font-size: 0.75rem; font-weight: normal; }
    .content { padding: 24px; }
    .form-group { margin-bottom: 18px; position: relative; }
    label { font-weight: 600; display: block; margin-bottom: 6px; color: #1e293b; font-size: 0.85rem; }
    input { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 20px; font-size: 0.95rem; transition: 0.2s; }
    input:focus { outline: none; border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,0.1); }
    .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 20px 20px; max-height: 220px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
    .autocomplete-list div { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
    .autocomplete-list div:hover { background: #0d6efd; color: white; }
    .btn-group { display: flex; gap: 10px; margin: 20px 0 15px; }
    button { background: #0d6efd; color: white; border: none; padding: 10px 16px; border-radius: 40px; font-weight: 600; font-size: 0.9rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
    button:hover { background: #0b5ed7; transform: scale(0.98); }
    .btn-outline { background: white; color: #0d6efd; border: 1.5px solid #0d6efd; }
    .btn-outline:hover { background: #eef6ff; transform: none; }
    .btn-sm { background: #64748b; font-size: 0.8rem; padding: 6px 12px; }
    .btn-sm:hover { background: #475569; }
    .card-result { background: #f8fafc; border-radius: 24px; padding: 16px; margin: 15px 0; border-left: 5px solid #0d6efd; }
    .price-row { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #cbd5e1; }
    .price-tc { font-size: 1.5rem; font-weight: 800; color: #0d6efd; }
    .price-bx { font-size: 1.5rem; font-weight: 800; color: #dc2626; }
    .radio-group { background: #f1f5f9; padding: 10px 16px; border-radius: 50px; display: inline-flex; gap: 20px; margin: 10px 0 18px; flex-wrap: wrap; }
    .radio-group label { display: inline-flex; align-items: center; gap: 6px; font-weight: 500; margin: 0; cursor: pointer; }
    hr { margin: 24px 0; border: none; height: 1px; background: linear-gradient(to right, #cbd5e1, transparent); }
    .toast-message { margin-top: 16px; padding: 12px; border-radius: 50px; text-align: center; font-weight: 500; font-size: 0.85rem; }
    .success { background: #dcfce7; color: #15803d; border-left: 4px solid #22c55e; }
    .error { background: #fee2e2; color: #b91c1c; border-left: 4px solid #ef4444; }
    .loading { background: #fff3cd; color: #856404; }
    .info-bar { background: #e0f2fe; padding: 8px 12px; border-radius: 12px; margin-bottom: 16px; font-size: 0.75rem; color: #0369a1; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .point-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; max-height: 100px; overflow-y: auto; }
    .point-tag { background: white; padding: 4px 10px; border-radius: 16px; font-size: 0.7rem; color: #0f172a; cursor: pointer; border: 1px solid #b9d0f0; transition: 0.15s; }
    .point-tag:hover { background: #0d6efd; color: white; border-color: #0d6efd; }
    .note { font-size: 0.7rem; text-align: center; color: #64748b; margin-top: 20px; }
    footer { background: #f8fafc; text-align: center; padding: 12px; font-size: 0.7rem; color: #475569; border-top: 1px solid #e2e8f0; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .refresh-icon { font-size: 0.85rem; }
    @media (max-width: 550px) { .content { padding: 18px; } .price-tc, .price-bx { font-size: 1.2rem; } }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            🚖 Vận tải kết nối
            <span class="badge">Tiện chuyến · Bao xe</span>
        </h1>
        <p style="margin-top: 6px; opacity: 0.9; font-size: 0.8rem;">✅ Không phân biệt hoa/thường | Dữ liệu mới nhất</p>
    </div>
    <div class="content">
        <!-- Thanh thông báo nhẹ -->
        <div class="info-bar" id="infoBar">
            <span id="infoText">⏳ Đang tải dữ liệu...</span>
            <button id="btnReload" class="btn-sm" style="background:#0284c7; padding:4px 10px;">🔄 Tải lại</button>
        </div>

        <!-- Danh sách điểm (thu gọn, có thể ẩn/hiện) -->
        <details style="margin-bottom: 16px;">
            <summary style="font-size: 0.75rem; color: #64748b; cursor: pointer;">📋 Xem danh sách điểm có sẵn</summary>
            <div id="pointListContainer" class="point-list" style="margin-top: 8px;"></div>
        </details>

        <div class="form-group">
            <label>📍 Điểm đi</label>
            <div class="input-wrapper">
                <input type="text" id="diemDi" placeholder="VD: Bắc Kạn, Hà Nội..." autocomplete="off">
                <div id="autocompleteDi" class="autocomplete-list"></div>
            </div>
        </div>

        <div class="form-group">
            <label>📍 Điểm đến</label>
            <div class="input-wrapper">
                <input type="text" id="diemDen" placeholder="VD: Na Rì, Hải Phòng..." autocomplete="off">
                <div id="autocompleteDen" class="autocomplete-list"></div>
            </div>
        </div>

        <div class="btn-group">
            <button id="btnTraCuu" style="flex:2">🔍 Tra cứu giá</button>
            <button id="btnDoiViTri" class="btn-outline" style="flex:1">🔄 Đổi chiều</button>
        </div>

        <div id="ketQuaContainer"></div>

        <hr />

        <h3 style="margin-bottom: 14px; font-size: 1.2rem;">✍️ Đặt xe ngay</h3>

        <div class="radio-group">
            <label><input type="radio" name="loaiXe" value="tien_chuyen" checked> 🚗 Tiện chuyến</label>
            <label><input type="radio" name="loaiXe" value="bao_xe"> 🚙 Bao xe</label>
        </div>

        <div class="form-group"><label>👤 Họ và tên</label><input type="text" id="hoTen" placeholder="Nguyễn Văn A"></div>
        <div class="form-group"><label>📞 Số điện thoại</label><input type="tel" id="sdt" placeholder="0912345678"></div>
        <div class="form-group"><label>📧 Email</label><input type="email" id="email" placeholder="example@gmail.com (tùy chọn)"></div>
        
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <div style="flex:1"><label>📅 Ngày đi</label><input type="date" id="ngayDi"></div>
            <div style="flex:1"><label>⏰ Giờ đi</label><input type="time" id="gioDi"></div>
        </div>

        <button id="btnDatXe" style="width: 100%; margin-top: 20px;">🚀 Xác nhận đặt xe</button>
        <div id="thongBao"></div>
        <div class="note">💡 Điểm mới thêm vào Google Sheet? Nhấn "Tải lại" để cập nhật ngay!</div>
    </div>
    <footer>⚡ Dữ liệu trực tiếp từ Google Sheet | Nhấn Tải lại nếu vừa cập nhật điểm mới</footer>
</div>

<script>
    // Cấu hình
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1ql2Aruz-GCF8lAInY-b_b72d74vazyhM2-wwSiCCNNQ/export?format=csv";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzkIQhjOZ2Tg7K9Pml9XnsUlMvcIfjCdUAJwN3fRZPqlIya34wHqc3UeXFowJbTgBbqGg/exec";
    
    let danhSachTuyen = [];
    let danhSachDiaDanh = [];
    let isLoading = false;
    
    // DOM elements
    const diemDiInput = document.getElementById('diemDi');
    const diemDenInput = document.getElementById('diemDen');
    const autoDiDiv = document.getElementById('autocompleteDi');
    const autoDenDiv = document.getElementById('autocompleteDen');
    const ketQuaDiv = document.getElementById('ketQuaContainer');
    const thongBaoDiv = document.getElementById('thongBao');
    const infoText = document.getElementById('infoText');
    const pointListContainer = document.getElementById('pointListContainer');
    
    // Hàm chuẩn hóa (bỏ dấu, viết thường)
    function normalizePlace(str) {
        if (!str) return "";
        let normalized = str.toLowerCase().trim();
        normalized = normalized.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        normalized = normalized.replace(/đ/g, "d").replace(/Đ/g, "d");
        normalized = normalized.replace(/\s+/g, " ");
        return normalized;
    }
    
    function isSameLocation(loc1, loc2) {
        if (!loc1 || !loc2) return false;
        return normalizePlace(loc1) === normalizePlace(loc2);
    }
    
    // Tải dữ liệu từ Google Sheet (force refresh)
    async function loadDataFromSheet(showMessage = true) {
        if (isLoading) return;
        isLoading = true;
        
        if (showMessage) {
            infoText.innerHTML = '⏳ Đang tải từ Google Sheet...';
        }
        
        try {
            // Thêm timestamp để tránh cache trình duyệt
            const url = `${CSV_URL}&_t=${Date.now()}`;
            const response = await fetch(url, { cache: 'no-store' });
            if (!response.ok) throw new Error("Không thể tải CSV");
            const csvText = await response.text();
            
            const rows = parseCSV(csvText);
            if (rows.length < 2) throw new Error("CSV không có dữ liệu");
            
            const headers = rows[0].map(h => h.trim().toLowerCase());
            const idxDi = headers.findIndex(h => h === "điểm đi");
            const idxDen = headers.findIndex(h => h === "điểm đến");
            const idxKm = headers.findIndex(h => h === "số km");
            const idxGiaTc = headers.findIndex(h => h === "giá tiện chuyến");
            const idxGiaBx = headers.findIndex(h => h === "giá bao xe");
            
            if ([idxDi, idxDen, idxKm, idxGiaTc, idxGiaBx].some(i => i === -1)) {
                throw new Error("Cấu trúc cột không đúng");
            }
            
            const newTuyen = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length < 5) continue;
                const diemDi = row[idxDi]?.trim();
                const diemDen = row[idxDen]?.trim();
                if (!diemDi || !diemDen) continue;
                
                let kmRaw = (row[idxKm] || "").replace(/[^0-9.-]/g, '');
                let giaTcRaw = (row[idxGiaTc] || "").replace(/[^0-9.-]/g, '');
                let giaBxRaw = (row[idxGiaBx] || "").replace(/[^0-9.-]/g, '');
                
                newTuyen.push({
                    diemDi: diemDi,
                    diemDen: diemDen,
                    km: parseFloat(kmRaw) || 0,
                    giaTienChuyen: parseFloat(giaTcRaw) || 0,
                    giaBaoXe: parseFloat(giaBxRaw) || 0,
                });
            }
            
            if (newTuyen.length === 0) {
                infoText.innerHTML = '❌ Không có dữ liệu tuyến';
                return;
            }
            
            danhSachTuyen = newTuyen;
            
            // Cập nhật danh sách địa danh
            const diaDanhSet = new Set();
            danhSachTuyen.forEach(t => { 
                diaDanhSet.add(t.diemDi); 
                diaDanhSet.add(t.diemDen); 
            });
            danhSachDiaDanh = Array.from(diaDanhSet).sort((a,b) => a.localeCompare(b, 'vi'));
            
            // Cập nhật giao diện
            infoText.innerHTML = `✅ ${danhSachTuyen.length} tuyến · ${danhSachDiaDanh.length} điểm`;
            
            // Cập nhật danh sách điểm (dạng tag)
            pointListContainer.innerHTML = danhSachDiaDanh.map(point => 
                `<span class="point-tag" data-point="${point.replace(/"/g, '&quot;')}">${point}</span>`
            ).join('');
            
            // Gắn sự kiện click cho các tag điểm
            document.querySelectorAll('.point-tag').forEach(tag => {
                tag.removeEventListener('click', handlePointClick);
                tag.addEventListener('click', handlePointClick);
            });
            
            // Cập nhật autocomplete
            setupAutocomplete(diemDiInput, autoDiDiv);
            setupAutocomplete(diemDenInput, autoDenDiv);
            
            if (showMessage) {
                const oldResult = ketQuaDiv.innerHTML;
                ketQuaDiv.innerHTML = `<div style="background:#dcfce7; border-radius:20px; padding:10px; text-align:center; font-size:0.8rem; color:#166534;">✅ Đã cập nhật ${danhSachTuyen.length} tuyến, ${danhSachDiaDanh.length} điểm</div>`;
                setTimeout(() => { if (ketQuaDiv.innerHTML.includes('cập nhật')) ketQuaDiv.innerHTML = oldResult || ''; }, 2000);
            }
            
        } catch (error) {
            console.error(error);
            infoText.innerHTML = '❌ Lỗi tải dữ liệu';
            if (showMessage) {
                ketQuaDiv.innerHTML = `<div class="toast-message error">❌ Lỗi: ${error.message}. Kiểm tra kết nối hoặc sheet.</div>`;
            }
        } finally {
            isLoading = false;
        }
    }
    
    function handlePointClick(e) {
        const point = e.currentTarget.getAttribute('data-point');
        if (document.activeElement === diemDiInput || diemDiInput.value === "") {
            diemDiInput.value = point;
            if (diemDenInput.value) traCuuGia();
        } else {
            diemDenInput.value = point;
            if (diemDiInput.value) traCuuGia();
        }
    }
    
    function parseCSV(csvString) {
        const rows = [];
        const lines = csvString.split(/\r?\n/);
        for (let line of lines) {
            if (line.trim() === "") continue;
            const row = [];
            let inQuote = false;
            let current = '';
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuote = !inQuote;
                else if (char === ',' && !inQuote) { row.push(current.trim()); current = ''; }
                else current += char;
            }
            row.push(current.trim());
            rows.push(row);
        }
        return rows;
    }
    
    function setupAutocomplete(inputElement, listElement) {
        const showSuggestions = (keyword) => {
            listElement.innerHTML = '';
            if (!danhSachDiaDanh.length) return;
            
            const searchNorm = normalizePlace(keyword);
            let filtered = keyword === "" ? danhSachDiaDanh.slice(0, 15) : 
                danhSachDiaDanh.filter(p => normalizePlace(p).includes(searchNorm) || p.toLowerCase().includes(keyword.toLowerCase())).slice(0, 15);
            
            if (filtered.length === 0) {
                const div = document.createElement('div');
                div.textContent = '📭 Không tìm thấy';
                div.style.color = '#94a3b8';
                div.style.cursor = 'default';
                div.style.padding = '10px 14px';
                listElement.appendChild(div);
            } else {
                filtered.forEach(place => {
                    const div = document.createElement('div');
                    div.textContent = place;
                    div.addEventListener('click', () => { 
                        inputElement.value = place; 
                        listElement.style.display = 'none'; 
                        traCuuGia(); 
                    });
                    listElement.appendChild(div);
                });
            }
            listElement.style.display = filtered.length > 0 ? 'block' : 'none';
        };
        
        inputElement.removeEventListener('input', window[`_input_${inputElement.id}`]);
        inputElement.removeEventListener('focus', window[`_focus_${inputElement.id}`]);
        
        const inputHandler = (e) => showSuggestions(e.target.value);
        const focusHandler = () => { if (danhSachDiaDanh.length) showSuggestions(inputElement.value); };
        
        inputElement.addEventListener('input', inputHandler);
        inputElement.addEventListener('focus', focusHandler);
        
        window[`_input_${inputElement.id}`] = inputHandler;
        window[`_focus_${inputElement.id}`] = focusHandler;
        
        document.addEventListener('click', (e) => {
            if (!inputElement.contains(e.target) && !listElement.contains(e.target)) {
                listElement.style.display = 'none';
            }
        });
    }
    
    function traCuuGia() {
        let di = diemDiInput.value.trim();
        let den = diemDenInput.value.trim();
        
        if (!di || !den) {
            ketQuaDiv.innerHTML = '<div class="toast-message error">❗ Nhập đủ điểm đi và đến</div>';
            return;
        }
        
        if (isSameLocation(di, den)) {
            ketQuaDiv.innerHTML = '<div class="toast-message error">📍 Điểm đi và đến không thể trùng</div>';
            return;
        }
        
        const tuyen = danhSachTuyen.find(t => 
            (isSameLocation(t.diemDi, di) && isSameLocation(t.diemDen, den)) ||
            (isSameLocation(t.diemDi, den) && isSameLocation(t.diemDen, di))
        );
        
        if (!tuyen) {
            ketQuaDiv.innerHTML = `
                <div class="toast-message error">
                    🚫 Không tìm thấy tuyến: ${di} → ${den}<br><br>
                    📋 <strong>Các điểm có sẵn:</strong> ${danhSachDiaDanh.slice(0, 12).join(', ')}${danhSachDiaDanh.length > 12 ? '...' : ''}<br>
                    💡 <strong>Vừa thêm điểm mới?</strong> Nhấn nút <strong>"Tải lại"</strong> để cập nhật!
                </div>
            `;
            window.lastQueriedRoute = null;
            return;
        }
        
        const formatVND = (num) => num.toLocaleString('vi-VN') + 'đ';
        ketQuaDiv.innerHTML = `
            <div class="card-result">
                <div class="flex-between" style="margin-bottom:8px;">
                    <span><strong>🚩 Đi:</strong> ${tuyen.diemDi}</span>
                    <span><strong>🏁 Đến:</strong> ${tuyen.diemDen}</span>
                </div>
                <div style="margin-bottom:10px;"><strong>🛣️ KM:</strong> ${tuyen.km} km</div>
                <div class="price-row"><span>🚗 Tiện chuyến</span><span class="price-tc">${formatVND(tuyen.giaTienChuyen)}</span></div>
                <div class="price-row"><span>🚙 Bao xe</span><span class="price-bx">${formatVND(tuyen.giaBaoXe)}</span></div>
            </div>
        `;
        window.lastQueriedRoute = tuyen;
    }
    
    function doiViTri() {
        const temp = diemDiInput.value;
        diemDiInput.value = diemDenInput.value;
        diemDenInput.value = temp;
        traCuuGia();
    }
    
    async function datXe() {
        const hoTen = document.getElementById('hoTen').value.trim();
        const sdt = document.getElementById('sdt').value.trim();
        const email = document.getElementById('email').value.trim();
        const ngayDi = document.getElementById('ngayDi').value;
        const gioDi = document.getElementById('gioDi').value;
        const diemDi = diemDiInput.value.trim();
        const diemDen = diemDenInput.value.trim();
        const loaiXe = document.querySelector('input[name="loaiXe"]:checked').value;
        
        if (!hoTen || !sdt || !ngayDi || !gioDi) {
            alert("Vui lòng nhập HỌ TÊN, SĐT, NGÀY và GIỜ");
            return;
        }
        
        let tuyen = window.lastQueriedRoute;
        if (!tuyen || !(isSameLocation(tuyen.diemDi, diemDi) && isSameLocation(tuyen.diemDen, diemDen))) {
            tuyen = danhSachTuyen.find(t => 
                (isSameLocation(t.diemDi, diemDi) && isSameLocation(t.diemDen, diemDen)) ||
                (isSameLocation(t.diemDi, diemDen) && isSameLocation(t.diemDen, diemDi))
            );
        }
        
        if (!tuyen) {
            alert("Không tìm thấy giá cho tuyến này. Hãy tra cứu trước!");
            return;
        }
        
        const loaiXeText = loaiXe === "tien_chuyen" ? "Tiện chuyến" : "Bao xe";
        const giaTri = loaiXe === "tien_chuyen" ? tuyen.giaTienChuyen : tuyen.giaBaoXe;
        
        if (!confirm(`XÁC NHẬN ĐẶT ${loaiXeText.toUpperCase()}\n👤 ${hoTen}\n📞 ${sdt}\n🚏 ${diemDi} → ${diemDen}\n📅 ${ngayDi} ${gioDi}\n💰 ${giaTri.toLocaleString('vi-VN')}đ`)) return;
        
        thongBaoDiv.innerHTML = '⏳ Đang gửi...'; thongBaoDiv.className = 'toast-message loading';
        
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'createBooking', hoTen, sdt, email, diemDi, diemDen, ngayDi, gioDi, loaiXe: loaiXeText, giaTri, timestamp: new Date().toISOString() })
            });
            thongBaoDiv.innerHTML = '✅ Đặt xe thành công! CSKH sẽ liên hệ.'; thongBaoDiv.className = 'toast-message success';
            document.getElementById('hoTen').value = ''; document.getElementById('sdt').value = ''; document.getElementById('email').value = '';
            setTimeout(() => { thongBaoDiv.innerHTML = ''; }, 5000);
        } catch(err) {
            thongBaoDiv.innerHTML = '❌ Lỗi gửi, thử lại'; thongBaoDiv.className = 'toast-message error';
        }
    }
    
    function setDefaultDateTime() {
        const today = new Date();
        document.getElementById('ngayDi').value = today.toISOString().split('T')[0];
        document.getElementById('gioDi').value = '08:00';
    }
    
    // Sự kiện
    document.getElementById('btnTraCuu').addEventListener('click', traCuuGia);
    document.getElementById('btnDoiViTri').addEventListener('click', doiViTri);
    document.getElementById('btnDatXe').addEventListener('click', datXe);
    document.getElementById('btnReload').addEventListener('click', () => loadDataFromSheet(true));
    
    // Khởi tạo
    loadDataFromSheet(true).then(setDefaultDateTime);
</script>
